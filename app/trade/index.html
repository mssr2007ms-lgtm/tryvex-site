<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Торговля — TRYVEX</title>
  <link rel="icon" type="image/png" href="../../assets/icons/favicon.png">
  <link rel="stylesheet" href="../../assets/css/variables.css">
  <link rel="stylesheet" href="../../assets/css/reset.css">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/nav.css">
  <style>
    .coming-soon {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: var(--space-md);
      text-align: center;
      padding: var(--space-xl) var(--space-md);
      padding-top: calc(64px + var(--space-xl));
    }
    .coming-soon__icon { font-size: 4rem; }
    .coming-soon__title {
      font-family: var(--font-primary);
      font-size: var(--size-3xl);
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--color-silver);
    }
    .coming-soon__title span { color: var(--color-accent); }
    .coming-soon__desc {
      font-size: var(--size-lg);
      color: var(--color-text-dim);
      max-width: 520px;
      line-height: 1.7;
    }
    .coming-soon__hint {
      font-size: var(--size-sm);
      color: var(--color-text-dim);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--space-sm) var(--space-md);
      background: var(--color-bg-card);
    }
  </style>
</head>
<body>

  <header class="nav" id="nav">
    <div class="nav__inner container">
      <a href="../../index.html" class="nav__logo">
        <img class="nav__logo-svg" src="../../assets/images/icon.png" alt="TRYVEX">

      </a>
      <nav class="nav__links" id="navLinks">
        <a href="index.html"                        class="nav__link nav__link--active">Торговля</a>

        <a href="../screeners/index.html"           class="nav__link">Скринеры</a>

      </nav>
      <div class="nav__actions">

        <a href="../../index.html#download" class="btn btn-primary btn--sm">Скачать</a>
      </div>
      <button class="nav__burger" id="navBurger"><span></span><span></span><span></span></button>
    </div>

  <div class="coming-soon">
    <div class="coming-soon__icon">📊</div>

      Полный функционал уже доступен в десктопном приложении.

    <div class="coming-soon__hint">
      💡 Скачайте TRYVEX для Windows — торговля, скальпинг и алготрейдинг без ограничений
    </div>
    <div style="display:flex; gap:var(--space-sm); flex-wrap:wrap; justify-content:center;">
      <a href="../../index.html#download" class="btn btn-primary">Скачать приложение</a>
      <a href="../../index.html"          class="btn btn-outline">На главную</a>
    </div>
  </div>

  <script type="module" src="../../js/nav.js"></script>
</body>
</html>
