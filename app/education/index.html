          { h: 'Что такое RSI и как он рассчитывается', b: 'RSI (Relative Strength Index, Индекс относительной силы) — осциллятор разработанный Уэллесом Уайлдером в 1978 году. Измеряет скорость и величину ценовых изменений за определённый период.\n\nФормула (упрощённо):\nRSI = 100 - (100 / (1 + RS))\nгде RS = средний прирост / средний убыток за N периодов\n\nСтандартный период: 14 свечей\n\nДиапазон: от 0 до 100\n• Выше 70 — зона перекупленности\n• Ниже 30 — зона перепроданности\n• 50 — нейтральная зона\n\nВажное понимание:\nRSI выше 70 не означает «продавать прямо сейчас». В сильном тренде RSI может месяцами оставаться выше 70. Это значит что актив активно покупается, а не что нужно входить в шорт.' },
          { h: 'Классическое использование RSI', b: 'Базовые сигналы RSI — самые известные, но не самые мощные.\n\nПерекупленность и перепроданность:\nRSI > 70 при боковом рынке → возможный откат\nRSI < 30 при боковом рынке → возможный отскок\n\nКлючевое слово: «возможный». Без контекста эти сигналы дают слишком много ложных срабатываний.\n\nПересечение уровня 50:\nRSI пересекает 50 снизу вверх — смена импульса на бычий\nRSI пересекает 50 сверху вниз — смена импульса на медвежий\nИспользуется как дополнительный фильтр тренда.\n\nБычья зона и медвежья зона:\nВ восходящем тренде RSI обычно колеблется между 40 и 80. Откат к 40–45 = возможная точка покупки.\nВ нисходящем тренде — между 20 и 60. Отскок к 55–60 = возможная точка продажи.' },
          { h: 'Дивергенция RSI — самый мощный сигнал', b: 'Дивергенция — расхождение между направлением цены и RSI. Один из наиболее надёжных сигналов технического анализа.\n\nМедвежья дивергенция:\nЦена: новый максимум выше предыдущего\nRSI: максимум ниже предыдущего\nЗначение: покупатели слабеют, тренд теряет силу\nДействие: ищем точку входа в шорт или выход из лонга\n\nБычья дивергенция:\nЦена: новый минимум ниже предыдущего\nRSI: минимум выше предыдущего\nЗначение: продавцы слабеют, возможный разворот вверх\nДействие: ищем точку входа в лонг\n\nСкрытая дивергенция (продолжение тренда):\n• Скрытая бычья: цена делает более высокий минимум, RSI — более низкий. Сигнал продолжения восходящего тренда\n• Скрытая медвежья: цена делает более низкий максимум, RSI — более высокий. Сигнал продолжения нисходящего тренда\n\nКак использовать дивергенцию:\n1. Нашли дивергенцию\n2. Ждите подтверждения — разворотная свеча, пробой локального уровня\n3. Вход с коротким стопом за последний экстремум\n4. Лучше работает на 4ч и дневном таймфреймах' },
          { h: 'RSI в комбинации с другими инструментами', b: 'RSI наиболее эффективен как фильтр и подтверждение, а не как самостоятельный сигнал.\n\nRSI + Уровни:\nСамая мощная комбинация. Цена у уровня поддержки + RSI в зоне перепроданности (25–30) + бычья свеча = высоковероятный вход в лонг.\n\nRSI + Тренд:\nТоргуйте только сигналы RSI в направлении старшего тренда. В восходящем тренде (цена выше MA200) — только сигналы на покупку из зоны 30–40. Игнорируйте сигналы против тренда.\n\nRSI + Объём:\nДивергенция на снижающемся объёме — более надёжный сигнал чем дивергенция на высоком объёме.\n\nНастройка периода:\n• 14 — стандарт, подходит для большинства случаев\n• 7–9 — более чувствительный, больше сигналов (и больше ложных)\n• 21–25 — менее чувствительный, только самые сильные сигналы\n\nДля скальпинга на 1м–5м используют RSI(7) или RSI(9). Для свинга — RSI(14) или RSI(21).' },
        ]},
        { id: 'copy-trading', title: 'Копитрейдинг', sections: [
          { h: 'Что такое копитрейдинг', b: 'Копитрейдинг — автоматическое копирование сделок опытного трейдера на ваш аккаунт. Вы выбираете трейдера-«мастера», указываете сумму и пропорцию копирования — система автоматически повторяет все его входы и выходы.\n\nКак это работает технически:\nПлатформа подключена к аккаунту мастера. Как только мастер открывает позицию — система автоматически открывает пропорциональную позицию на вашем аккаунте. Задержка — доли секунды.\n\nОсновные площадки:\n• Bybit Copy Trading — встроен в биржу, большой выбор мастеров\n• Binance Copy Trading — аналогично\n• MEXC, OKX — также предлагают копитрейдинг\n• Специализированные платформы: Covesting, 3Commas' },
          { h: 'Как выбрать трейдера для копирования', b: 'Выбор мастера — самое важное решение в копитрейдинге. Большинство проблем возникают именно здесь.\n\nМетрики для анализа:\n\nДоходность:\n• Смотрите не на максимальную месячную доходность, а на стабильность\n• Равномерная кривая доходности лучше резких скачков\n• Период наблюдения — минимум 3–6 месяцев\n\nМаксимальная просадка (Max Drawdown):\n• Насколько сильно падал баланс от пика до дна\n• Просадка >30% — высокий риск\n• Сравните просадку с доходностью: 50% доход при 40% просадке — плохое соотношение\n\nWin Rate и Risk/Reward:\n• Высокий win rate (>80%) при маленькой прибыли на сделку — часто мартингейл или опасные стратегии\n• Нормально: 45–60% win rate при соотношении прибыль/убыток 1.5:1 и выше\n\nСтиль торговли:\n• Сколько сделок в день/неделю?\n• Какой инструмент — спот или фьючерсы?\n• Какое максимальное используемое плечо?' },
          { h: 'Риски копитрейдинга', b: 'Копитрейдинг — не пассивный безрисковый доход. Понимание рисков обязательно.\n\nИсторические результаты ≠ будущие результаты:\nТрейдер с 12 месяцами отличных результатов может начать сливать на 13-й. Прошлая доходность не гарантирует будущую.\n\nПровалы в рейтинге:\nПлатформы показывают только активных трейдеров. Те кто слили депозит — уже не видны в статистике. Это создаёт искажение выборки в пользу успешных.\n\nПлечо и стиль:\nНекоторые мастера достигают высокой доходности через экстремальное плечо. В какой-то момент это приведёт к ликвидации — и всех копировщиков вместе.\n\nКомиссии мастеру:\nМастера берут 5–30% от прибыли. При успешном копировании это значительная часть дохода.\n\nПравило:\nНе вкладывайте в копитрейдинг более 10–20% капитала. Диверсифицируйте между несколькими мастерами с разными стилями.' },
        ]},
        { id: 'choosing-coin', title: 'Как выбрать криптовалюту для торговли', sections: [
          { h: 'Принципы выбора инструмента', b: 'Не все криптовалюты одинаково подходят для торговли. Выбор инструмента — важное решение которое влияет на результат.\n\nОсновные критерии:\n\nЛиквидность:\nВысокий суточный объём = глубокий стакан = минимальное проскальзывание. Для активной торговли выбирайте пары с объёмом от $100M в сутки. Топ для торговли: BTC, ETH, SOL, BNB, XRP, DOGE.\n\nВолатильность:\nСлишком маленькая волатильность — нечего ловить. Слишком высокая — риски чрезмерны. Оптимально для дейтрейдинга: дневная волатильность 2–5%.\n\nПредсказуемость паттернов:\nНекоторые инструменты лучше уважают технический анализ. BTC и ETH — самые «техничные». Мем-коины движутся хаотично.\n\nКорреляция с BTC:\nБольшинство альткоинов высоко коррелированы с Bitcoin. Если вы хотите торговать изолированное движение — выбирайте инструменты с низкой корреляцией или торгуйте сам BTC.' },
          { h: 'Bitcoin vs Альткоины для торговли', b: 'Практический выбор между BTC и альтами.\n\nBitcoin (BTC):\n• Самая высокая ликвидность — минимальное проскальзывание\n• Хорошо работает технический анализ\n• Движения более плавные, меньше ложных пробоев\n• Меньший потенциал роста в %\n• Рекомендуется для: свинга, алготрейдинга, начинающих\n\nEthereum (ETH):\n• Вторая ликвидность на рынке\n• Собственные движения независимо от BTC (иногда)\n• Выше волатильность чем у BTC\n\nТоп альткоины (SOL, BNB, DOGE и др.):\n• Выше потенциальная прибыль в %\n• Выше волатильность и риск\n• Хуже технический анализ на малых таймфреймах\n• Выше риск манипуляций\n• Для: опытных трейдеров, скальпинга на импульсах\n\nВывод для новичка:\nНачинайте с BTC или ETH. Освойте свою стратегию на этих инструментах прежде чем переходить к альткоинам.' },
          { h: 'Фильтры для поиска торговых возможностей', b: 'Вместо того чтобы следить за сотнями монет — используйте систему фильтрации.\n\nСкринер уровней TRYVEX:\nТоп-15 инструментов по объёму с изменением цены за 1ч/4ч/24ч. Ищите аномальные значения — монеты которые резко выросли или упали без видимой причины часто продолжают движение.\n\nСпайк-скринер TRYVEX:\nАвтоматически находит монеты с резким движением прямо сейчас. Самый быстрый способ найти торговую возможность — не нужно самому мониторить сотни пар.\n\nScrinер плит TRYVEX:\nНаходит инструменты с крупными аномальными заявками в стакане. Часто предшествует сильному движению.\n\nСтратегия «Торгуй лучшее»:\nКаждый день выбирайте 2–3 инструмента которые показывают наилучшие технические условия. Торгуйте только их. Не распыляйтесь на 20 монет одновременно.' },
        ]},
        { id: 'news-fud', title: 'Как читать новости и не попасть на FUD', sections: [
          { h: 'Влияние новостей на крипторынок', b: 'Криптовалютный рынок реагирует на новости быстрее и острее чем традиционные рынки. Понимание информационного потока — важная часть торговой грамотности.\n\nВиды новостей:\n\nМакроэкономические:\nРешения ФРС по ставкам, данные по инфляции (CPI), отчёты по занятости. Влияют на весь рынок риска — акции, крипта движутся вместе. Публикуются по расписанию — всегда знайте когда выйдет очередной отчёт.\n\nКрипто-регуляция:\nРешения SEC об ETF, запреты торговли в странах, лицензирование бирж. Долгосрочный фактор.\n\nТехнические события:\nХалвинг, крупные обновления протоколов (Ethereum merge), листинги на топ-биржах. Известны заранее — «покупай ожидание, продавай факт».\n\nКризисные новости:\nВзломы бирж и протоколов, банкротства (FTX, Celsius), регуляторные иски. Краткосрочная паника, часто с последующим восстановлением.' },
          { h: 'FUD и FOMO — информационные манипуляции', b: 'FUD (Fear, Uncertainty, Doubt — страх, неопределённость, сомнение) — распространение негативной информации для снижения цены актива.\n\nКак работает FUD:\nКто-то хочет купить дешевле или уже в шорте. Появляются статьи о «крахе», «регуляторном запрете», «взломе» — часто преувеличенные или вырванные из контекста. Розничные инвесторы в панике продают. Цена падает. Тот кто запустил FUD покупает на дне.\n\nФUMO (Fear of Missing Out) в информационном пространстве:\nПроект везде обсуждают, инфлюенсеры кричат «ракета», каналы советуют «брать сейчас». Как правило — это момент когда киты начинают продавать.\n\nПризнаки манипулятивного контента:\n• Гарантии («точно вырастет на 500%»)\n• Срочность («последний шанс»)\n• Анонимный источник («из надёжных источников»)\n• Один вывод из неоднозначных данных\n• Эмоциональный язык вместо фактов' },
          { h: 'Как правильно читать крипто-новости', b: 'Система работы с информацией для трейдера.\n\nНадёжные источники:\n• CoinDesk, The Block, Decrypt — профессиональные крипто-СМИ\n• Официальные блоги проектов и бирж\n• On-chain данные: Glassnode, CryptoQuant, Dune Analytics\n• Twitter/X аккаунты ключевых разработчиков (Виталик Бутерин, Сатоши-эпигоны)\n\nПравила работы с новостями:\n1. Проверяйте первоисточник — не статью пересказывающую статью пересказывающую твит\n2. Отделяйте факты от мнений — «биржа взломана» (факт) vs «крипта мертва» (мнение)\n3. Смотрите на реакцию рынка — если «плохая новость» а рынок растёт, умные деньги знали заранее\n4. Не торгуйте в момент выхода важных новостей если нет опыта — движение непредсказуемо\n\nПринцип «Покупай ожидание — продавай факт»:\nМногие позитивные события (листинг, халвинг, обновление сети) вызывают рост ДО события и коррекцию ПОСЛЕ. Рынок отыгрывает информацию заранее.' },
          { h: 'Информационная гигиена трейдера', b: 'Слишком много информации не лучше чем слишком мало. Информационный шум — враг чёткого мышления.\n\nПравила информационной гигиены:\n\nЗнайте ключевые даты:\nВедите календарь экономических событий: заседания ФРС, публикации CPI, разлоки токенов крупных проектов. В эти дни будьте особенно осторожны.\n\nОграничьте источники:\nВыберите 3–5 надёжных источников и придерживайтесь их. Чем больше каналов вы читаете — тем больше противоречивой информации и тем сложнее принять чёткое решение.\n\nТоргуйте по графику, не по новостям:\nВаша стратегия должна работать на основе технических данных. Новости — это контекст, а не сигнал. Если вы ждёте новости чтобы принять торговое решение — у вас нет торговой системы.\n\nСоциальные сети:\nTwitter и Telegram в крипте — главные источники FUD и FOMO. Не принимайте торговые решения на основе постов инфлюенсеров. Они либо уже в позиции либо продают подписку.' },
        ]},
      ]
    },
    {
      id: 'strategies', title: 'Торговые стратегии',
      articles: [
        { id: 'trend-strategies', title: 'Трендовые стратегии', sections: [
          { h: 'Основы трендовой торговли', b: 'Тренд — направленное движение цены. Восходящий тренд: каждый следующий максимум выше предыдущего, каждый следующий минимум выше предыдущего. Нисходящий тренд — зеркально.\n\nПочему трендовые стратегии работают:\nТренды существуют потому что информация и капитал распределяются неравномерно. Институциональные инвесторы накапливают позиции постепенно, это создаёт направленное движение которое длится неделями и месяцами. Присоединяясь к тренду — вы торгуете в направлении наиболее сильных участников рынка.\n\nОпределение тренда:\n• Структура цены — последовательность максимумов и минимумов\n• MA200 на дневном графике — если цена выше, долгосрочный тренд восходящий\n• Угол наклона MA50 — крутой угол вверх = сильный тренд\n\nОшибка новичков: торговать против тренда «потому что слишком выросло». Тренды длятся дольше чем кажется логичным.' },
          { h: 'Стратегия пробоя уровня', b: 'Пробой — момент когда цена преодолевает ключевой уровень поддержки или сопротивления. Это сигнал к изменению баланса сил между покупателями и продавцами.\n\nУсловия для входа на пробой:\n1. Выявите ключевой уровень — горизонтальный уровень с несколькими касаниями\n2. Дождитесь пробоя — закрытие свечи за уровнем\n3. Подтверждение объёмом — пробой на повышенном объёме значительно надёжнее\n4. Вход — при закрытии пробойной свечи или на откате к уровню\n\nУправление сделкой:\n• Стоп — за уровень пробоя (если цена вернулась — пробой был ложным)\n• Первая цель — ширина предшествующего консолидационного диапазона\n• Трейлинг-стоп — для максимизации прибыли при сильном движении\n\nЛожный пробой:\nЦена ненадолго выходит за уровень и возвращается — это "медвежья/бычья ловушка". Признак: пробой на низком объёме, длинная тень свечи за уровнем. Для защиты — ждите закрытия свечи, не входите внутри свечи.' },
          { h: 'Ретест пробитого уровня', b: 'После пробоя цена часто возвращается к уровню для «теста» прежде чем продолжить движение. Это один из самых надёжных и выгодных паттернов входа.\n\nПочему происходит ретест:\nПосле пробоя трейдеры которые не успели войти ждут отката. Их накопленные ордера на покупку создают поддержку на бывшем сопротивлении — и цена отталкивается от него.\n\nВход на ретест:\n1. Дождитесь пробоя уровня\n2. Пусть цена уйдёт от уровня на 2–5%\n3. При возврате к уровню ищите подтверждение (разворотная свеча, объём)\n4. Вход с коротким стопом за уровень\n\nПреимущества ретеста перед пробоем:\n• Меньший стоп-лосс (ближе к уровню)\n• Лучшее соотношение риск/прибыль\n• Психологически проще войти на откате чем в момент импульса\n\nГлавный риск: иногда ретеста не происходит и цена уходит без оглядки. Решение: часть позиции на пробое, часть — на ретесте.' },
          { h: 'Торговля по скользящим средним', b: 'Скользящие средние (MA) — трендовые индикаторы, сглаживающие ценовые данные. Три ключевых применения.\n\n1. Определение тренда:\nЦена выше MA — восходящий тренд. Ниже — нисходящий. Используйте MA200 на дневном графике как главный фильтр: торгуйте только лонги если цена выше MA200.\n\n2. Динамическая поддержка/сопротивление:\nВ сильном тренде цена регулярно откатывается к MA20 или MA50 и отталкивается. Это даёт выгодные точки входа по тренду с небольшим стопом.\n\n3. Пересечения MA:\n• Золотой крест — MA50 пересекает MA200 снизу вверх. Сильный долгосрочный сигнал начала восходящего тренда\n• Мёртвый крест — MA50 пересекает MA200 сверху вниз. Сигнал смены тренда на нисходящий\n• EMA12/EMA26 — более быстрая версия, лежит в основе индикатора MACD\n\nПрактическая система:\n• EMA21 — краткосрочный тренд (для дейтрейдинга)\n• EMA50 — среднесрочный тренд\n• MA200 — долгосрочный тренд (главный фильтр направления)' },
          { h: 'Канальные стратегии', b: 'Ценовой канал — две параллельные линии, ограничивающие движение цены сверху и снизу. Работает в трендовых и боковых рынках.\n\nВосходящий канал:\nВерхняя линия соединяет максимумы, нижняя — минимумы. Цена движется между ними. Тактика: покупать у нижней границы канала, фиксировать у верхней.\n\nПробой канала:\nЕсли цена пробивает верхнюю границу — ускорение тренда. Если пробивает нижнюю — возможная смена тренда.\n\nФлэт (боковой канал):\nГоризонтальный коридор между поддержкой и сопротивлением. Покупать у поддержки, продавать у сопротивления. Стоп — за границу канала. Выход из флэта (пробой границы) часто даёт сильное направленное движение.' },
        ]},
        { id: 'reversal-strategies', title: 'Стратегии на разворот', sections: [
          { h: 'Торговля от уровней', b: 'Разворотные стратегии — вход против текущего движения в точке где ожидается смена направления. Требуют большей точности чем трендовые, но дают отличное соотношение риск/прибыль.\n\nКак торговать от уровня:\n1. Определите значимый уровень поддержки или сопротивления\n2. Дождитесь подхода цены к уровню\n3. Ищите подтверждение — разворотная свеча (молот, поглощение), снижение объёма на подходе\n4. Вход с коротким стопом за уровень\n5. Цель — противоположная граница диапазона\n\nЧем сильнее уровень — тем надёжнее торговля от него:\n• 5 касаний лучше 2 касаний\n• Круглые числа ($50 000, $100 000) психологически значимы\n• Зоны высокого объёма (Volume Profile) — сильнейшие уровни\n\nГлавный риск разворотных стратегий — торговать против сильного тренда. Всегда торгуйте от уровней в направлении старшего тренда если возможно.' },
          { h: 'Дивергенция RSI', b: 'Дивергенция — расхождение между движением цены и показанием осциллятора (RSI, MACD). Это один из самых сильных сигналов ослабления тренда и возможного разворота.\n\nБычья дивергенция (сигнал на рост):\nЦена формирует новый минимум ниже предыдущего, а RSI формирует минимум ВЫШЕ предыдущего. Продавцы слабеют — им всё сложнее двигать цену ниже. Ждите разворота вверх.\n\nМедвежья дивергенция (сигнал на падение):\nЦена формирует новый максимум выше предыдущего, а RSI формирует максимум НИЖЕ предыдущего. Покупатели выдыхаются. Ждите разворота вниз.\n\nСкрытая дивергенция (продолжение тренда):\n• Скрытая бычья: цена формирует более высокий минимум, RSI — более низкий минимум. Сигнал продолжения восходящего тренда.\n\nКак использовать:\nДивергенция сама по себе не сигнал к немедленному входу — это предупреждение. Дождитесь подтверждения: разворотная свеча, пробой локального уровня или другой технический сигнал.\n\nЛучший таймфрейм: 4ч и дневной для надёжных сигналов. На 1м много ложных дивергенций.' },
          { h: 'Паттерн «Голова и плечи»', b: 'Голова и плечи — один из самых известных разворотных паттернов технического анализа. Встречается на вершинах восходящего тренда.\n\nСтруктура:\n• Левое плечо — рост, затем откат\n• Голова — новый максимум, затем откат\n• Правое плечо — рост до уровня левого плеча (не до головы), затем откат\n• Линия шеи — горизонтальная или немного наклонная линия через минимумы между плечами и головой\n\nСигнал:\nПробой линии шеи вниз с увеличенным объёмом — подтверждение паттерна.\n\nЦель:\nРасстояние от головы до линии шеи откладывается вниз от точки пробоя.\n\nВход:\nКонсервативный — на ретесте линии шеи после пробоя (линия шеи теперь сопротивление). Агрессивный — сразу на пробое.\n\nОбратный паттерн (перевёрнутые голова и плечи) работает на дне нисходящего тренда и является сигналом разворота вверх.' },
          { h: 'Двойная вершина и двойное дно', b: 'Двойная вершина (Double Top) — паттерн разворота с восходящего на нисходящий тренд.\n\nСтруктура:\nЦена дважды достигает примерно одного уровня сопротивления и разворачивается. Между вершинами — откат (долина). Буква «М».\n\nСигнал и вход:\nПробой уровня долины вниз — подтверждение паттерна. Чем дольше формировался паттерн (недели, а не часы) — тем он надёжнее.\nЦель: расстояние от вершины до долины, отложенное вниз от пробоя.\n\nДвойное дно (Double Bottom) — зеркальный паттерн. Буква «W».\nДва касания поддержки, пробой уровня между ними вверх. Один из самых надёжных разворотных сигналов на дне рынка.\n\nОтличие от простого отскока:\nПри двойном дне второй минимум должен быть примерно на том же уровне что первый (±2–3%). Если второй минимум существенно ниже — паттерн не сформирован.' },
          { h: 'Паттерны свечного анализа для разворотов', b: 'Отдельные свечные паттерны дают сигналы разворота когда формируются на ключевых уровнях.\n\nНа дне (сигналы роста):\n• Молот — маленькое тело у верхней части, длинная нижняя тень (минимум вдвое длиннее тела). Покупатели выкупили снижение\n• Бычье поглощение — зелёная свеча полностью перекрывает предыдущую красную\n• Утренняя звезда — три свечи: большая красная, маленькая (доджи), большая зелёная. Классический разворот\n• Пин-бар с длинной нижней тенью — цена резко опустилась и была выкуплена\n\nНа вершине (сигналы падения):\n• Падающая звезда — длинная верхняя тень, маленькое тело внизу. Продавцы задавили рост\n• Медвежье поглощение — красная свеча полностью перекрывает предыдущую зелёную\n• Вечерняя звезда — зеркало утренней звезды\n• Доджи на максимуме после длинного роста — равновесие, неопределённость\n\nВажно: свечные паттерны работают как подтверждение на уровне, но не как самостоятельный сигнал без контекста.' },
        ]},
        { id: 'volume-strategies', title: 'Объёмный анализ и стакан', sections: [
          { h: 'Объём — голос рынка', b: 'Объём — количество единиц актива, сменивших владельца за период. Это единственный показатель который невозможно нарисовать: цену можно двигать малым числом сделок, объём — нет.\n\nОсновные правила объёмного анализа:\n• Рост цены + высокий объём = сильное движение с участием крупных игроков\n• Рост цены + низкий объём = слабое движение, вероятен откат\n• Падение на высоком объёме = паническая продажа, часто предшествует дну\n• Падение на низком объёме = коррекция в тренде, вероятно продолжение роста\n\nVolume Spike:\nРезкое увеличение объёма (в 3–5 раз выше среднего) часто маркирует важные точки разворота или начало сильного движения. Именно такие аномалии отслеживает спайк-скринер TRYVEX.\n\nVolume Profile:\nРаспределение объёма по ценовым уровням за период. Point of Control (POC) — уровень с максимальным объёмом. Зоны высокого объёма (High Volume Node) — сильная поддержка/сопротивление. Зоны низкого объёма (Low Volume Node) — цена проходит их быстро.' },
          { h: 'Стакан ордеров', b: 'Стакан (Order Book) — список активных заявок на покупку (Bid) и продажу (Ask) по каждому ценовому уровню. Это мгновенный снимок намерений участников рынка.\n\nКак читать стакан:\n• Bid (зелёные) — заявки на покупку, выстроены от текущей цены вниз\n• Ask (красные) — заявки на продажу, выстроены от текущей цены вверх\n• Спред — разница между лучшим Bid и лучшим Ask. Меньше спред = выше ликвидность\n• Глубина стакана — насколько много заявок на разных уровнях\n\nЧто искать в стакане:\n• Плиты (Walls) — аномально крупные заявки на одном уровне. Часто работают как поддержка или сопротивление\n• Дисбаланс — если объём на Bid значительно превышает Ask — давление покупателей\n• Поглощение — крупная заявка исчезает при подходе цены к ней (была «проглочена» рыночными ордерами)\n\nВ TRYVEX скринер плит автоматически сканирует стаканы 300+ инструментов и находит аномальные заявки по всему рынку.' },
          { h: 'Торговля по стакану (Tape Reading)', b: 'Tape Reading — анализ потока ордеров в реальном времени для определения направления движения. Профессиональная техника скальперов.\n\nЧто наблюдать:\n\nПоглощение на уровне:\nЕсли крупная плита Bid поглощается (рыночными продажами) и цена продолжает падать — медвежий сигнал. Если плита Ask поглощается и цена растёт — бычий.\n\nСмена стакана:\nЕсли до этого на Bid было $10M а на Ask $3M, и вдруг картина разворачивается — возможная смена давления.\n\nСпуфинг:\nКрупная заявка выставляется для создания видимости поддержки/сопротивления, но снимается при подходе цены. Это манипуляция, технически запрещённая, но на крипторынке распространённая. Признак: заявка появляется и исчезает быстро, не участвует в реальной торговле.\n\nДля работы со стаканом в TRYVEX: горизонтальный режим отображения даёт максимально удобный обзор bid и ask одновременно.' },
          { h: 'Скринер резких движений как торговый инструмент', b: 'Спайк (Spike) — резкое аномальное движение цены за короткий промежуток. Возникает при дисбалансе спроса и предложения: крупный рыночный ордер сдвигает цену быстрее чем стакан успевает пополниться.\n\nПочему спайки важны:\nСпайки часто являются первым признаком сильного движения. Новость вышла, крупный игрок начал накапливать, ликвидации стопов создали каскад — всё это проявляется как резкое движение цены которое можно поймать в самом начале.\n\nСтратегии на спайки:\n\nТоргуй продолжение:\nПосле спайка вверх на высоком объёме — цена часто продолжает движение на волне ликвидаций шортов и срабатывания стоп-бай ордеров. Вход в первые секунды, стоп — уровень откуда начался спайк.\n\nТоргуй откат:\nПосле экстремального спайка на низком объёме — цена часто возвращается к исходному уровню. Это называется reversion to mean.\n\nФильтры качества спайка:\n• Объём — спайк с объёмом в 5+ раз выше среднего значительно надёжнее\n• Направление основного тренда — спайк по тренду надёжнее контртрендового\n• Время — спайки в начале сессий (открытие европейской, американской) часто более значимые\n\nВ TRYVEX спайк-скринер мониторит Binance Spot и Bybit Futures одновременно — нажимаете на строку и инструмент мгновенно открывается в скальпинг-модуле.' },
        ]},
        { id: 'algo-strategies', title: 'Алгоритмические стратегии', sections: [
          { h: 'Маркет-мейкинг', b: 'Маркет-мейкер — участник рынка который одновременно выставляет заявки на покупку (Bid) и продажу (Ask) вблизи текущей цены. Прибыль — спред между ценой покупки и продажи.\n\nКак работает:\nРобот постоянно держит открытыми две заявки: купить по $99.95 и продать по $100.05. Когда обе исполнились — прибыль $0.10 с каждого «оборота».\n\nПочему это работает:\nЦена постоянно колеблется вокруг справедливого значения. Маркет-мейкер зарабатывает на каждом таком колебании не угадывая направление.\n\nТребования:\n• Высокая скорость исполнения — заявки нужно постоянно корректировать\n• Глубокая ликвидность инструмента — на низколиквидных парах сложно заполнить заявки\n• Управление инвентарём — если позиция накопилась в одну сторону, нужна балансировка\n\nВ TRYVEX реализован как стратегия MarketMaker. Подходит для опытных трейдеров — требует правильной настройки параметров спреда и размера позиции.' },
          { h: 'Трейлинг с доборами (TrailingAdd)', b: 'Гибридная стратегия сочетающая усреднение позиции и трейлинг-стоп.\n\nЛогика:\n1. Вход по сигналу индикатора\n2. Если цена идёт против позиции — добор (открытие дополнительного объёма по более выгодной цене)\n3. Стоп переносится по мере доборов\n4. Когда цена разворачивается и идёт в нужную сторону — трейлинг-стоп следует за ней, фиксируя прибыль\n\nПреимущества:\n• Снижение средней цены входа при доборах\n• Трейлинг позволяет максимально использовать движение в нужную сторону\n• Автоматическая работа без участия трейдера\n\nРиски:\n• При длительном движении против позиции — большая просадка до разворота\n• Требует достаточного капитала для всех доборов\n\nВ TRYVEX стратегия называется TrailingAdd. Параметры: размер первого входа, размер и количество доборов, шаг добора, трейлинг-стоп после разворота.' },
          { h: 'Lead-Lag арбитраж', b: 'Стратегия основана на статистически наблюдаемом эффекте: некоторые инструменты реагируют на рыночные события раньше других. Если лидер резко двигается — лаггер с высокой вероятностью повторит это движение в ближайшее время.\n\nПримеры Lead-Lag пар:\n• Фьючерс BTC на Binance / фьючерс BTC на Bybit — небольшая задержка между биржами\n• BTC / ETH — BTC часто ведёт, ETH следует\n• Крупный альткоин / малый альткоин того же сектора\n\nКак работает алгоритм:\n1. Подключение к двум источникам данных одновременно\n2. Мониторинг лидера в реальном времени\n3. При резком движении лидера — немедленный вход в лаггер в том же направлении\n4. Выход при достижении цели или при нейтральном сигнале лидера\n\nВ TRYVEX реализован как BinanceLeadBot — отслеживает BTC/ETH на Binance и торгует коррелирующими инструментами. Требует подключения к нескольким биржам.' },
          { h: 'Сеточная торговля', b: 'Сетка (Grid Trading) — автоматическое выставление ордеров через равные ценовые интервалы. Робот покупает при каждом снижении и продаёт при каждом росте на заданную величину.\n\nКак устроена сетка:\nНапример, инструмент торгуется по $100. Сетка с шагом 1%:\n• Купить при $99, $98, $97, $96...\n• Продать при $101, $102, $103...\n\nПри каждом «зубе пилы» — фиксация прибыли равной шагу сетки.\n\nКогда работает хорошо:\n• Боковой рынок (флэт) — цена колеблется в диапазоне\n• Высоковолатильные инструменты — больше колебаний = больше срабатываний\n\nКогда не работает:\n• Направленный тренд — при сильном падении сетка накапливает убыточные лонги\n• Нужен большой диапазон для ордеров иначе капитал заблокирован\n\nВарианты:\nРавномерная сетка — одинаковые шаги. Геометрическая сетка — шаги в процентах (равноудалены на логарифмической шкале). Направленная сетка — только покупки или только продажи.' },
          { h: 'Написать собственную стратегию в TRYVEX', b: 'В TRYVEX вы можете написать любую торговую стратегию на C# прямо в терминале. Это открывает неограниченные возможности для автоматизации.\n\nЧто доступно в коде:\n• Полная история свечей по любому инструменту\n• Встроенные индикаторы: EMA, SMA, RSI, MACD, Bollinger, ATR и другие\n• Методы открытия позиций: по рынку, по лимитному ордеру, по стоп-ордеру\n• Управление позицией: трейлинг-стоп, частичная фиксация, перенос стопа в безубыток\n• Доступ к стакану ордеров в реальном времени\n• Мультиинструментальные стратегии — торговля несколькими парами одновременно\n\nПроцесс разработки:\n1. Пишете код в редакторе терминала\n2. Запускаете бэктест — проверка на исторических данных\n3. Запускаете в демо-режиме — проверка на реальных котировках\n4. Запускаете в реальную торговлю\n\nНет навыков программирования? Закажите бота у команды TRYVEX — мы реализуем любую торговую идею.' },
        ]},
      ]
    },
  ];

  // ══════════════════════════════════════════════════════════
  // СОСТОЯНИЕ
  // ══════════════════════════════════════════════════════════

  let currentChapterId = null;
  let currentArticleId = null;

  // Плоский список всех статей для навигации prev/next и поиска
  const allArticles = [];
  chapters.forEach(ch => ch.articles.forEach(a => allArticles.push({ ...a, chapterId: ch.id, chapterTitle: ch.title })));

  // ══════════════════════════════════════════════════════════
  // РЕНДЕР САЙДБАРА
  // ══════════════════════════════════════════════════════════

  function renderSidebar() {
    const sidebar = document.getElementById('eduSidebar');
    sidebar.innerHTML = chapters.map(ch => `
      <div class="edu-chapter">
        <div class="edu-chapter__title">${ch.title}</div>
        ${ch.articles.map(a => `
          <button class="edu-nav-item ${a.id === currentArticleId ? 'edu-nav-item--active' : ''}"
            onclick="openArticle('${ch.id}', '${a.id}')">${a.title}</button>
        `).join('')}
      </div>
    `).join('');
  }

  // ══════════════════════════════════════════════════════════
  // РЕНДЕР СТАТЬИ
  // ══════════════════════════════════════════════════════════

  function openArticle(chapterId, articleId) {
    currentChapterId = chapterId;
    currentArticleId = articleId;

    const chapter = chapters.find(c => c.id === chapterId);
    const article = chapter?.articles.find(a => a.id === articleId);
    if (!article) return;

    renderSidebar();

    const idx = allArticles.findIndex(a => a.id === articleId && a.chapterId === chapterId);
    const prev = allArticles[idx - 1];
    const next = allArticles[idx + 1];

    const content = document.getElementById('eduContent');
    content.innerHTML = `
      <div class="edu-breadcrumb">${chapter.title} <span>›</span> ${article.title}</div>
      <h1 class="edu-article__title">${article.title}</h1>
      ${article.sections.map(s => `
        <div class="edu-section">
          <div class="edu-section__heading">${s.h}</div>
          <div class="edu-section__text">${s.b}</div>
        </div>
      `).join('')}
      <div class="edu-nav-btns">
        ${prev ? `<button class="edu-nav-btn" onclick="openArticle('${prev.chapterId}', '${prev.id}')">
          <span class="edu-nav-btn__label">‹ Предыдущая</span>
          <span class="edu-nav-btn__title">${prev.title}</span>
        </button>` : '<div></div>'}
        ${next ? `<button class="edu-nav-btn edu-nav-btn--next" onclick="openArticle('${next.chapterId}', '${next.id}')">
          <span class="edu-nav-btn__label">Следующая ›</span>
          <span class="edu-nav-btn__title">${next.title}</span>
        </button>` : ''}
      </div>
    `;

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ══════════════════════════════════════════════════════════
  // ЭКРАН ПРИВЕТСТВИЯ
  // ══════════════════════════════════════════════════════════

  function renderWelcome() {
    const content = document.getElementById('eduContent');
    content.innerHTML = `
      <div class="edu-welcome">
        <h2 class="edu-welcome__title">С чего <span>начать?</span></h2>
        <p class="edu-welcome__desc">Выберите раздел который вас интересует или начните с первой статьи — «Быстрый старт». Все материалы бесплатны и не требуют регистрации.</p>
        <p class="edu-welcome__desc" style="margin-top: calc(var(--space-sm) * -1);">Здесь вы всегда найдёте актуальную информацию о терминале TRYVEX — новых функциях и способах их использования, о криптовалютных рынках и реальных подходах к заработку на них. Мы постоянно пополняем базу знаний — заглядывайте регулярно, чтобы быть среди первых кто узнаёт о новых возможностях.</p>
      </div>
    `;
  }

  // ══════════════════════════════════════════════════════════
  // ПОИСК
  // ══════════════════════════════════════════════════════════

  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');

  searchInput.addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    if (q.length < 2) { searchResults.style.display = 'none'; return; }

    const results = [];
    allArticles.forEach(a => {
      if (a.title.toLowerCase().includes(q) || a.sections.some(s => s.h.toLowerCase().includes(q) || s.b.toLowerCase().includes(q))) {
        results.push(a);
      }
    });

    if (results.length === 0) {
      searchResults.innerHTML = '<div style="padding:var(--space-sm) var(--space-md);color:var(--color-text-dim);font-size:var(--size-sm);">Ничего не найдено</div>';
    } else {
      searchResults.innerHTML = results.slice(0, 8).map(a => `
        <div class="search-result-item" onclick="openArticle('${a.chapterId}', '${a.id}'); document.getElementById('searchInput').value=''; document.getElementById('searchResults').style.display='none';">
          <div class="search-result-item__title">${a.title}</div>
          <div class="search-result-item__chapter">${a.chapterTitle}</div>
        </div>
      `).join('');
    }
    searchResults.style.display = 'block';
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.edu-search')) searchResults.style.display = 'none';
  });

  // ══════════════════════════════════════════════════════════
  // INIT
  // ══════════════════════════════════════════════════════════

  renderSidebar();
  renderWelcome();

  </script>
</body>
</html>
