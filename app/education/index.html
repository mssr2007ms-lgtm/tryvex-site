  const chapters = [
    {
      id: 'terminal', title: 'Как пользоваться терминалом',
      articles: [
        { id: 'start', title: 'Быстрый старт — с чего начать', sections: [
          { h: 'Первый запуск', b: 'После запуска терминала вы попадаете на вкладку Торговля. Чтобы начать работу без биржевого аккаунта — просто перейдите в раздел Подключение и выберите Демо-режим. Если у вас уже есть аккаунт на бирже — добавьте API-ключи там же.' },
          { h: 'Демо-режим', b: 'В демо-режиме все данные реальные — графики, стакан, цены обновляются в реальном времени — но ордера не исполняются на бирже. Это идеальный способ изучить терминал и протестировать стратегии без финансового риска. Выберите Демо в разделе Подключение и нажмите Подключить.' },
          { h: 'Навигация по вкладкам', b: 'В верхней панели расположены все разделы терминала:\n• Торговля — основной график, стакан и управление ордерами\n• Скальпинг — многопанельный интерфейс для быстрой торговли с несколькими инструментами одновременно\n• Позиции — открытые позиции и балансы по монетам\n• Алготрейдинг — торговые роботы, работающие автоматически\n• Скринеры — поиск торговых возможностей по всему рынку\n• Обучение — эта страница' },
        ]},
        { id: 'trading', title: 'Вкладка Торговля', sections: [
          { h: 'Выбор инструмента', b: 'В верхней части страницы нажмите на название инструмента (например BTCUSDT) и начните вводить название монеты. Появится список подходящих инструментов с популярными парами вверху — выберите нужный кликом или нажмите Enter.' },
          { h: 'Таймфреймы', b: 'Над графиком расположены кнопки таймфреймов: 1м, 5м, 15м, 30м, 1ч, 4ч, 1д. Нажмите кнопку «…» чтобы увидеть дополнительные таймфреймы. Таймфрейм определяет сколько времени отображает каждая свеча — например на 15м каждая свеча = 15 минут торговли.' },
          { h: 'Стакан ордеров', b: 'Справа от графика расположен стакан — список активных заявок на покупку (зелёные, Bid) и продажу (красные, Ask). Чем больше объём на уровне — тем крупнее отображение строки.\n\nКлик левой кнопкой мыши по любому уровню в стакане автоматически подставляет эту цену в торговую панель для выставления ордера.' },
          { h: 'Навигация по графику', b: 'Прокручивайте колесо мыши для изменения масштаба. Удерживайте левую кнопку мыши и тяните для перемещения по истории. Двойной клик сбрасывает масштаб и возвращает к актуальным данным.' },
        ]},
        { id: 'scalping', title: 'Вкладка Скальпинг', sections: [
          { h: 'Что такое скальпинг-режим', b: 'Скальпинг — торговля на коротких движениях цены. В TRYVEX скальпинг-режим позволяет открыть несколько независимых панелей с разными инструментами и работать с ними одновременно на одном экране.' },
          { h: 'Открыть новую панель', b: 'Нажмите кнопку + в верхней части вкладки. Появится плавающая панель с графиком и стаканом. Введите название инструмента в поле ввода вверху панели — начнёт показываться список с подсказками — и нажмите Enter или выберите из списка.' },
          { h: 'Синхронизация (цветные группы)', b: 'Цветные кружки в заголовке каждой панели — это группы синхронизации. Панели одного цвета следят за одним инструментом: меняете символ в одной — меняется во всех панелях той же группы. Удобно когда вы смотрите на один инструмент сразу в нескольких таймфреймах.' },
          { h: 'Страницы рабочих пространств', b: 'В нижней части вкладки расположены вкладки-страницы (1, 2, 3...). Каждая страница — отдельный набор панелей. Вы можете сохранить одну конфигурацию для скальпинга фьючерсов, другую — для спотовой торговли, и быстро переключаться между ними.' },
          { h: 'Перемещение и размер панелей', b: 'Тяните панель за заголовок чтобы переместить. Тяните за правый нижний угол для изменения размера. Панели автоматически прилипают к краям экрана и друг к другу для аккуратного расположения.' },
        ]},
        { id: 'screeners-tab', title: 'Вкладка Скринеры', sections: [
          { h: 'Что такое скринер и зачем он нужен', b: 'Скринер автоматически сканирует весь рынок — сотни инструментов одновременно — и показывает только те, которые соответствуют заданным критериям. Вместо того чтобы вручную просматривать каждую монету, скринер делает это за вас и подсвечивает интересные ситуации в реальном времени.' },
          { h: 'Скринер резких движений', b: 'Отслеживает весь рынок фьючерсов Bybit и фиксирует момент когда цена инструмента резко ускоряется. Сигнал появляется раньше, чем большинство трейдеров успевают заметить движение.\n\nКнопки фильтрации:\n• Источник (Bybit Fut, Binance Spot) — какие биржи сканировать\n• Мин. % — минимальный процент изменения для попадания в список\n• Период — за какое время считается изменение\n• Сторона — показывать только рост, только падение, или всё' },
          { h: 'Скринер плит', b: 'Сканирует стаканы ордеров по всем инструментам и ищет уровни с аномально большим объёмом — «плиты». Плита — это заявка, объём которой в несколько раз превышает средний по стакану. Такие уровни часто работают как поддержка или сопротивление.\n\n• Мин. кратность — во сколько раз объём уровня должен превышать средний\n• Сторона — Все / Bid (поддержка) / Ask (сопротивление)' },

    {
      id: 'crypto', title: 'Криптовалюта: база знаний',

        { id: 'what-is-crypto', title: 'Что такое криптовалюта', sections: [
          { h: 'Простыми словами', b: 'Криптовалюта — это цифровые деньги, которые существуют только в интернете. В отличие от обычных денег, их не выпускает банк или государство. Вместо этого они работают на технологии блокчейн — распределённой базе данных, которую невозможно подделать или взломать.' },
          { h: 'Что такое блокчейн', b: 'Блокчейн — это цепочка блоков, каждый из которых содержит информацию о транзакциях. Эта цепочка хранится одновременно на тысячах компьютеров по всему миру. Чтобы изменить запись — нужно изменить её на всех компьютерах одновременно, что практически невозможно. Именно это делает криптовалюту надёжной.' },
          { h: 'Bitcoin — первая криптовалюта', b: 'Bitcoin создан в 2009 году анонимным разработчиком под псевдонимом Сатоши Накамото. Максимальное количество биткоинов ограничено 21 миллионом — это защищает от инфляции. Биткоин называют «цифровым золотом» — он служит средством сохранения стоимости.' },

          { h: 'Спот и фьючерсы', b: 'Спот-торговля: вы покупаете реальную монету и владеете ею.\n\nФьючерсы: вы торгуете контрактами на изменение цены без покупки самой монеты. Фьючерсы позволяют использовать кредитное плечо (торговать большим объёмом чем есть денег) и открывать позиции на понижение цены (шорт).' },
          { h: 'Рыночная капитализация', b: 'Капитализация = цена монеты × количество монет в обращении. По ней условно делят монеты на:\n• Large cap (>$10 млрд) — Bitcoin, Ethereum — наиболее стабильные\n• Mid cap ($1–10 млрд) — высокий потенциал роста\n• Small cap (<$1 млрд) — высокий риск и высокий потенциал' },

        { id: 'ta-fa', title: 'Технический и фундаментальный анализ', sections: [
          { h: 'Что такое технический анализ', b: 'Технический анализ (ТА) — метод оценки активов на основе изучения графика цены и объёма торгов. Цель — найти закономерности, которые указывают на вероятное будущее движение.\n\nТА основан на трёх постулатах:\n1. Рынок учитывает всё — цена уже отражает всю доступную информацию\n2. Цены движутся в трендах — тренд продолжается пока нет чёткого сигнала разворота\n3. История повторяется — человеческая психология не меняется, поэтому паттерны работают снова и снова' },
          { h: 'Уровни поддержки и сопротивления', b: 'Поддержка — ценовой уровень где покупатели достаточно активны чтобы остановить падение. Сопротивление — уровень где продавцы останавливают рост.\n\nУровни определяются по историческим максимумам, минимумам и зонам скопления объёма. Когда цена пробивает уровень — роли меняются: бывшее сопротивление становится поддержкой.' },
          { h: 'Свечной анализ и паттерны', b: 'Японские свечи показывают четыре цены за период: открытие, максимум, минимум, закрытие. Паттерны — повторяющиеся комбинации свечей:\n\n• Молот — длинная нижняя тень, разворот снизу вверх\n• Поглощение — большая свеча «поглощает» предыдущую, сильный разворотный сигнал\n• Доджи — тело почти нулевое, неопределённость и возможный разворот\n• Три белых солдата — три растущих свечи подряд, подтверждение восходящего тренда' },
          { h: 'Индикаторы', b: 'Индикаторы — математические расчёты на основе цены и объёма:\n• MA (скользящая средняя) — сглаживает цену, показывает тренд\n• RSI — измеряет перекупленность/перепроданность (выше 70 — перекуплен, ниже 30 — перепродан)\n• MACD — показывает смену импульса, пересечения сигнальных линий\n• Bollinger Bands — коридор волатильности, выход за пределы = сигнал' },
          { h: 'Фундаментальный анализ', b: 'Фундаментальный анализ (ФА) — оценка реальной ценности актива на основе данных о самом проекте, а не о графике цены.\n\nВопросы для ФА:\n• Какую реальную проблему решает проект?\n• Кто команда — есть ли опыт и публичность?\n• Кто инвесторы и партнёры?\n• Есть ли реальные пользователи или только спекуляция?\n• Токеномика — как распределены монеты, есть ли механизм сжигания?' },

          { h: 'Мошенничество — как распознать', b: 'Самые распространённые схемы:\n• Pump & Dump — искусственный разгон монеты с последующим обвалом\n• Фейковые проекты — красивый сайт без реального продукта\n• Фишинг — поддельные сайты бирж и кошельков\n• «Гарантированный доход» — в крипте не бывает гарантий прибыли\n\nПравило: если предложение звучит слишком хорошо — это повод проверить всё дважды.' },

          { h: 'Скальпинг', b: 'Открытие и закрытие позиций в течение секунд или минут. Цель — небольшая прибыль на каждой сделке при большом их количестве. Требует высокой концентрации, быстрой реакции и низких торговых комиссий. TRYVEX создан в том числе специально для скальперов — горячие клавиши, мгновенное исполнение, многопанельный интерфейс.' },

          { h: 'Свинг-трейдинг', b: 'Удержание позиций от нескольких дней до нескольких недель. Цель — поймать среднесрочные движения. Требует меньше времени — достаточно проверять графики раз в день. Подходит тем, кто совмещает с основной деятельностью.' },
          { h: 'Позиционная торговля и HODLing', b: 'Удержание позиций месяцами и годами. HODL (Hold On for Dear Life) — держать актив несмотря на краткосрочные просадки. Подходит для Bitcoin и крупных альткоинов с длинным горизонтом планирования.' },

          { h: 'Почему риск-менеджмент важнее точности входа', b: 'Можно угадывать направление в 40% случаев и всё равно зарабатывать — если правильно управлять рисками. Золотое правило: потенциальная прибыль на сделку должна быть в 2–3 раза больше допустимого убытка. При соотношении риск/прибыль 1:2 достаточно угадывать лишь треть сделок.' },
          { h: 'Стоп-лосс — защита капитала', b: 'Стоп-лосс — приказ автоматически закрыть позицию при достижении заранее определённого убытка. Всегда определяйте уровень стопа до входа в сделку, а не после. Нет стопа — нет торговли.' },
          { h: 'Тейк-профит и частичная фиксация', b: 'Тейк-профит — автоматическое закрытие позиции при достижении цели по прибыли. Хорошая практика — закрывать часть позиции при достижении первой цели и переносить стоп в безубыток, давая оставшейся части возможность принести дополнительную прибыль.' },

          { h: 'Психология трейдера', b: 'Самые частые ошибки:\n• FOMO (Fear Of Missing Out) — вход в позицию из страха упустить движение\n• Месть рынку — увеличение позиции после убытка\n• Жадность — отказ фиксировать прибыль в ожидании большего\n• Надежда — удержание убыточной позиции без стопа\n\nРешение: торговый план с чёткими правилами входа и выхода, и строгое их соблюдение.' },

          { h: 'Активная торговля', b: 'Спот и фьючерсная торговля — покупаете по одной цене, продаёте по другой. Требует знаний технического анализа, дисциплины и системного подхода к управлению рисками.' },

          { h: 'DCA — усреднение стоимости', b: 'Dollar Cost Averaging — регулярная покупка фиксированной суммы независимо от текущей цены. При высоких ценах вы покупаете меньше монет, при низких — больше. Это снижает влияние волатильности на среднюю цену покупки.' },

        ]},
        { id: 'reversal-strategies', title: 'Стратегии на разворот', sections: [
          { h: 'Торговля от уровней', b: 'Ищите уровни где цена разворачивалась несколько раз. Чем больше касаний — тем значимее уровень. При подходе цены к такому уровню ищите подтверждающий разворотный паттерн свечей (молот, поглощение) для входа против текущего движения.' },
          { h: 'Дивергенция RSI', b: 'Дивергенция — ситуация когда цена обновляет максимум, а RSI нет (или наоборот). Это указывает на ослабление текущего движения и вероятный разворот.\n\n• Медвежья дивергенция: новый максимум цены + более низкий максимум RSI → вероятное падение\n• Бычья дивергенция: новый минимум цены + более высокий минимум RSI → вероятный рост' },
          { h: 'Паттерн «Голова и плечи»', b: 'Один из самых известных разворотных паттернов. Состоит из трёх вершин: левое плечо, голова (самая высокая), правое плечо. Линия шеи — уровень минимумов между плечами. Пробой линии шеи вниз после правого плеча — сигнал на продажу.' },
          { h: 'Двойная вершина / двойное дно', b: 'Двойная вершина: цена дважды достигает одного уровня сопротивления и разворачивается. Пробой уровня между вершинами вниз — подтверждение разворота.\n\nДвойное дно — зеркальная картина: два касания поддержки, пробой уровня между ними вверх.' },
        ]},
        { id: 'volume-strategies', title: 'Объёмный анализ и стакан', sections: [
          { h: 'Зачем смотреть на объём', b: 'Объём — количество монет, сменивших владельца за период. Объём подтверждает движение цены. Рост цены на высоком объёме — сильный сигнал. Рост на низком объёме — слабый, вероятно временный.' },
          { h: 'Стакан ордеров как инструмент', b: 'Стакан показывает текущие намерения участников рынка. Крупная заявка (плита) на уровне — возможная поддержка или сопротивление. В скринере плит TRYVEX такие уровни автоматически находятся по всему рынку. Плита не гарантирует разворот — её могут убрать или «проглотить».' },
          { h: 'Дисбаланс bid/ask', b: 'Если объём на стороне bid (покупка) резко превышает ask (продажа) — это давление покупателей, вероятное движение вверх. И наоборот. Скринер резких движений TRYVEX фиксирует момент появления такого дисбаланса в реальном времени.' },
        ]},
        { id: 'algo-strategies', title: 'Алгоритмические стратегии', sections: [
          { h: 'Маркет-мейкинг', b: 'Стратегия: одновременно выставлять заявки на покупку и продажу вблизи текущей цены. Прибыль — спред между bid и ask. Требует быстрого исполнения и постоянной корректировки заявок. В TRYVEX реализована как встроенная стратегия MarketMaker.' },
          { h: 'Трейлинг с доборами', b: 'Стратегия: вход по сигналу, при движении против позиции — добор (усреднение) с одновременным смещением стопа. Трейлинг позволяет следовать за ценой когда она идёт в нужную сторону. В TRYVEX реализована как стратегия TrailingAdd.' },
          { h: 'Lead-Lag арбитраж', b: 'Основана на том что некоторые инструменты движутся раньше других (лидер-лаггер). Алгоритм отслеживает лидера и при его резком движении торгует коррелирующим инструментом-лаггером. Требует подключения к нескольким биржам.' },
          { h: 'Сеточная торговля', b: 'Стратегия: расставить ордера через равные интервалы цены (сетка). При движении цены вниз — покупки по каждому уровню сетки. При движении вверх — продажи. Прибыль на каждом «колебании» внутри сетки. Работает в боковом рынке (флэт).' },
        ]},
      ]
    },
  ];

  // ══════════════════════════════════════════════════════════
  // СОСТОЯНИЕ
  // ══════════════════════════════════════════════════════════

  let currentChapterId = null;
  let currentArticleId = null;

  // Плоский список всех статей для навигации prev/next и поиска
  const allArticles = [];
  chapters.forEach(ch => ch.articles.forEach(a => allArticles.push({ ...a, chapterId: ch.id, chapterTitle: ch.title })));

  // ══════════════════════════════════════════════════════════
  // РЕНДЕР САЙДБАРА
  // ══════════════════════════════════════════════════════════

  function renderSidebar() {
    const sidebar = document.getElementById('eduSidebar');
    sidebar.innerHTML = chapters.map(ch => `
      <div class="edu-chapter">
        <div class="edu-chapter__title">${ch.title}</div>
        ${ch.articles.map(a => `
          <button class="edu-nav-item ${a.id === currentArticleId ? 'edu-nav-item--active' : ''}"
            onclick="openArticle('${ch.id}', '${a.id}')">${a.title}</button>
        `).join('')}
      </div>
    `).join('');
  }

  // ══════════════════════════════════════════════════════════
  // РЕНДЕР СТАТЬИ
  // ══════════════════════════════════════════════════════════

  function openArticle(chapterId, articleId) {
    currentChapterId = chapterId;
    currentArticleId = articleId;

    const chapter = chapters.find(c => c.id === chapterId);
    const article = chapter?.articles.find(a => a.id === articleId);
    if (!article) return;

    renderSidebar();

    const idx = allArticles.findIndex(a => a.id === articleId && a.chapterId === chapterId);
    const prev = allArticles[idx - 1];
    const next = allArticles[idx + 1];

    const content = document.getElementById('eduContent');
    content.innerHTML = `
      <div class="edu-breadcrumb">${chapter.title} <span>›</span> ${article.title}</div>
      <h1 class="edu-article__title">${article.title}</h1>
      ${article.sections.map(s => `
        <div class="edu-section">
          <div class="edu-section__heading">${s.h}</div>
          <div class="edu-section__text">${s.b}</div>
        </div>
      `).join('')}
      <div class="edu-nav-btns">
        ${prev ? `<button class="edu-nav-btn" onclick="openArticle('${prev.chapterId}', '${prev.id}')">
          <span class="edu-nav-btn__label">‹ Предыдущая</span>
          <span class="edu-nav-btn__title">${prev.title}</span>
        </button>` : '<div></div>'}
        ${next ? `<button class="edu-nav-btn edu-nav-btn--next" onclick="openArticle('${next.chapterId}', '${next.id}')">
          <span class="edu-nav-btn__label">Следующая ›</span>
          <span class="edu-nav-btn__title">${next.title}</span>
        </button>` : ''}
      </div>
    `;

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ══════════════════════════════════════════════════════════
  // ЭКРАН ПРИВЕТСТВИЯ
  // ══════════════════════════════════════════════════════════

  function renderWelcome() {
    const content = document.getElementById('eduContent');
    content.innerHTML = `
      <div class="edu-welcome">
        <h2 class="edu-welcome__title">С чего <span>начать?</span></h2>
        <p class="edu-welcome__desc">Выберите раздел который вас интересует или начните с первой статьи — «Быстрый старт». Все материалы бесплатны и не требуют регистрации.</p>
        <p class="edu-welcome__desc" style="margin-top: calc(var(--space-sm) * -1);">Здесь вы всегда найдёте актуальную информацию о терминале TRYVEX — новых функциях и способах их использования, о криптовалютных рынках и реальных подходах к заработку на них. Мы постоянно пополняем базу знаний — заглядывайте регулярно, чтобы быть среди первых кто узнаёт о новых возможностях.</p>
      </div>
    `;
  }

  // ══════════════════════════════════════════════════════════
  // ПОИСК
  // ══════════════════════════════════════════════════════════

  const searchInput = document.getElementById('searchInput');
  const searchResults = document.getElementById('searchResults');

  searchInput.addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    if (q.length < 2) { searchResults.style.display = 'none'; return; }

    const results = [];
    allArticles.forEach(a => {
      if (a.title.toLowerCase().includes(q) || a.sections.some(s => s.h.toLowerCase().includes(q) || s.b.toLowerCase().includes(q))) {
        results.push(a);
      }
    });

    if (results.length === 0) {
      searchResults.innerHTML = '<div style="padding:var(--space-sm) var(--space-md);color:var(--color-text-dim);font-size:var(--size-sm);">Ничего не найдено</div>';
    } else {
      searchResults.innerHTML = results.slice(0, 8).map(a => `
        <div class="search-result-item" onclick="openArticle('${a.chapterId}', '${a.id}'); document.getElementById('searchInput').value=''; document.getElementById('searchResults').style.display='none';">
          <div class="search-result-item__title">${a.title}</div>
          <div class="search-result-item__chapter">${a.chapterTitle}</div>
        </div>
      `).join('');
    }
    searchResults.style.display = 'block';
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.edu-search')) searchResults.style.display = 'none';
  });

  // ══════════════════════════════════════════════════════════
  // INIT
  // ══════════════════════════════════════════════════════════

  renderSidebar();
  renderWelcome();

  </script>
</body>
</html>
