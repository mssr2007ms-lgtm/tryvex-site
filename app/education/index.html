  const chapters = [
    {
      id: 'terminal', title: 'Как пользоваться терминалом',
      articles: [
        { id: 'start', title: 'Быстрый старт — с чего начать', sections: [
          { h: 'Первый запуск', b: 'После запуска терминала вы попадаете на вкладку Торговля. Чтобы начать работу без биржевого аккаунта — просто перейдите в раздел Подключение и выберите Демо-режим. Если у вас уже есть аккаунт на бирже — добавьте API-ключи там же.' },
          { h: 'Демо-режим', b: 'В демо-режиме все данные реальные — графики, стакан, цены обновляются в реальном времени — но ордера не исполняются на бирже. Это идеальный способ изучить терминал и протестировать стратегии без финансового риска. Выберите Демо в разделе Подключение и нажмите Подключить.' },
          { h: 'Навигация по вкладкам', b: 'В верхней панели расположены все разделы терминала:\n• Торговля — основной график, стакан и управление ордерами\n• Скальпинг — многопанельный интерфейс для быстрой торговли с несколькими инструментами одновременно\n• Позиции — открытые позиции и балансы по монетам\n• Алготрейдинг — торговые роботы, работающие автоматически\n• Скринеры — поиск торговых возможностей по всему рынку\n• Обучение — эта страница' },
        ]},
        { id: 'trading', title: 'Вкладка Торговля', sections: [
          { h: 'Выбор инструмента', b: 'В верхней части страницы нажмите на название инструмента (например BTCUSDT) и начните вводить название монеты. Появится список подходящих инструментов с популярными парами вверху — выберите нужный кликом или нажмите Enter.' },
          { h: 'Таймфреймы', b: 'Над графиком расположены кнопки таймфреймов: 1м, 5м, 15м, 30м, 1ч, 4ч, 1д. Нажмите кнопку «…» чтобы увидеть дополнительные таймфреймы. Таймфрейм определяет сколько времени отображает каждая свеча — например на 15м каждая свеча = 15 минут торговли.' },
          { h: 'Стакан ордеров', b: 'Справа от графика расположен стакан — список активных заявок на покупку (зелёные, Bid) и продажу (красные, Ask). Чем больше объём на уровне — тем крупнее отображение строки.\n\nКлик левой кнопкой мыши по любому уровню в стакане автоматически подставляет эту цену в торговую панель для выставления ордера.' },
          { h: 'Навигация по графику', b: 'Прокручивайте колесо мыши для изменения масштаба. Удерживайте левую кнопку мыши и тяните для перемещения по истории. Двойной клик сбрасывает масштаб и возвращает к актуальным данным.' },
        ]},
        { id: 'scalping', title: 'Вкладка Скальпинг', sections: [
          { h: 'Что такое скальпинг-режим', b: 'Скальпинг — торговля на коротких движениях цены. В TRYVEX скальпинг-режим позволяет открыть несколько независимых панелей с разными инструментами и работать с ними одновременно на одном экране.' },
          { h: 'Открыть новую панель', b: 'Нажмите кнопку + в верхней части вкладки. Появится плавающая панель с графиком и стаканом. Введите название инструмента в поле ввода вверху панели — начнёт показываться список с подсказками — и нажмите Enter или выберите из списка.' },
          { h: 'Синхронизация (цветные группы)', b: 'Цветные кружки в заголовке каждой панели — это группы синхронизации. Панели одного цвета следят за одним инструментом: меняете символ в одной — меняется во всех панелях той же группы. Удобно когда вы смотрите на один инструмент сразу в нескольких таймфреймах.' },
          { h: 'Страницы рабочих пространств', b: 'В нижней части вкладки расположены вкладки-страницы (1, 2, 3...). Каждая страница — отдельный набор панелей. Вы можете сохранить одну конфигурацию для скальпинга фьючерсов, другую — для спотовой торговли, и быстро переключаться между ними.' },
          { h: 'Перемещение и размер панелей', b: 'Тяните панель за заголовок чтобы переместить. Тяните за правый нижний угол для изменения размера. Панели автоматически прилипают к краям экрана и друг к другу для аккуратного расположения.' },
        ]},
        { id: 'screeners-tab', title: 'Вкладка Скринеры', sections: [
          { h: 'Что такое скринер и зачем он нужен', b: 'Скринер автоматически сканирует весь рынок — сотни инструментов одновременно — и показывает только те, которые соответствуют заданным критериям. Вместо того чтобы вручную просматривать каждую монету, скринер делает это за вас и подсвечивает интересные ситуации в реальном времени.' },
          { h: 'Скринер резких движений', b: 'Отслеживает весь рынок фьючерсов Bybit и фиксирует момент когда цена инструмента резко ускоряется. Сигнал появляется раньше, чем большинство трейдеров успевают заметить движение.\n\nКнопки фильтрации:\n• Источник (Bybit Fut, Binance Spot) — какие биржи сканировать\n• Мин. % — минимальный процент изменения для попадания в список\n• Период — за какое время считается изменение\n• Сторона — показывать только рост, только падение, или всё' },
          { h: 'Скринер плит', b: 'Сканирует стаканы ордеров по всем инструментам и ищет уровни с аномально большим объёмом — «плиты». Плита — это заявка, объём которой в несколько раз превышает средний по стакану. Такие уровни часто работают как поддержка или сопротивление.\n\n• Мин. кратность — во сколько раз объём уровня должен превышать средний\n• Сторона — Все / Bid (поддержка) / Ask (сопротивление)' },
          { h: 'Как открыть инструмент из скринера', b: 'В правом верхнем углу каждого скринера расположен переключатель «Открывать в: Торговля / Скальпинг». Нажмите на строку в таблице — инструмент автоматически откроется в выбранном разделе.' },

        { id: 'algo-tab', title: 'Вкладка Алготрейдинг', sections: [
          { h: 'Что такое торговый робот', b: 'Торговый робот — алгоритм, который автоматически открывает и закрывает сделки по строго заданным правилам. Он работает 24/7 без вашего участия: не устаёт, не отвлекается, не поддаётся эмоциям.' },
          { h: 'Выбор и настройка стратегии', b: 'В левой части вкладки — список стратегий. Раздел «Встроенные» содержит готовые проверенные стратегии. Раздел «Личные» — ваши собственные. Нажмите на стратегию чтобы увидеть описание и параметры.\n\nПосле выбора стратегии укажите инструмент, объём, стоп-лосс, тейк-профит и параметры специфичные для стратегии. Нажмите Старт — робот начнёт работу немедленно.' },
          { h: 'Мониторинг и остановка', b: 'Во время работы отображается статус в реальном времени: текущая фаза (ожидание сигнала / в позиции / выход), направление сделки, уровень стопа. В логе внизу — все действия робота с временными метками.\n\nНажмите Стоп для плановой остановки. Важно: остановка не закрывает открытые позиции автоматически.' },

        { id: 'connect', title: 'Подключение к бирже', sections: [
          { h: 'Зачем подключать биржу', b: 'Без подключения к бирже терминал работает в демо-режиме: вы видите реальные котировки, графики и стаканы, но не можете торговать реальными деньгами. Подключение открывает полный функционал:\n• Выставление реальных ордеров прямо из терминала\n• Просмотр своих позиций и балансов в реальном времени\n• Запуск торговых роботов на реальном счёте' },
          { h: 'API-ключи на Bybit', b: '1. Зайдите на bybit.com и войдите в аккаунт\n2. Нажмите на аватар → Настройки аккаунта → API → Создать новый ключ\n3. Выберите тип: Системно-сгенерированный ключ API\n4. Дайте разрешения: Чтение + Торговля\n5. ВАЖНО: НЕ включайте разрешение на вывод средств\n6. Скопируйте API Key и Secret — Secret показывается только один раз' },
          { h: 'API-ключи на Binance', b: '1. Зайдите на binance.com → аватар → Управление API\n2. Создать API → введите название → пройдите верификацию\n3. Включите разрешения: Чтение, Спотовая торговля, Фьючерсная торговля\n4. Ограничьте доступ по IP для безопасности\n5. Сохраните ключи — Secret показывается только один раз' },
          { h: 'Безопасность ключей', b: 'Никогда не давайте разрешение на вывод средств в API-ключах. Ваши ключи хранятся зашифрованными только на вашем компьютере — мы не имеем к ним никакого доступа. Рекомендуем также ограничить ключи по IP-адресу в настройках биржи.' },

    {
      id: 'crypto', title: 'Криптовалюта: база знаний',
      articles: [
        { id: 'what-is-crypto', title: 'Что такое криптовалюта', sections: [
          { h: 'Простыми словами', b: 'Криптовалюта — это цифровые деньги, существующие только в виде записей в распределённой базе данных. Их никто не печатает, ни одно государство или центральный банк их не контролирует. Транзакции подтверждаются математически — через криптографические алгоритмы, отсюда и название.\n\nКлючевые свойства криптовалюты:\n• Децентрализация — нет единого управляющего центра\n• Прозрачность — все транзакции публичны и проверяемы\n• Необратимость — подтверждённую транзакцию нельзя отменить\n• Псевдоанонимность — адреса кошельков не привязаны к личности напрямую\n• Ограниченная эмиссия — у большинства монет есть максимальный лимит выпуска\n\nВ отличие от обычных денег, которые банк может заморозить или инфляция может обесценить, криптовалюта принадлежит только тому, кто владеет приватным ключом. Нет ключа — нет доступа. Есть ключ — никто не может забрать средства.' },
          { h: 'Что такое блокчейн', b: 'Блокчейн — технологическая основа криптовалют. Это база данных особого типа: информация хранится не на одном сервере, а одновременно на тысячах независимых компьютеров (нодах) по всему миру.\n\nКак устроен блок:\nКаждый блок содержит набор транзакций, временную метку и хеш предыдущего блока. Хеш — это уникальный цифровой отпечаток данных. Если изменить хоть один символ в блоке — изменится его хеш, что сломает всю цепочку следующих блоков. Чтобы подделать запись, нужно пересчитать всю цепочку быстрее чем это делает весь остальной майнинг-пул. На практике — невозможно.\n\nПочему это революционно:\nДо блокчейна для перевода денег нужен был посредник — банк, который подтверждает что у вас есть средства и деньги не были потрачены дважды. Блокчейн решает эту задачу математически, без посредников. Это первый в истории механизм цифрового доверия без центрального органа.' },
          { h: 'Bitcoin — цифровое золото', b: 'Bitcoin (BTC) создан в 2009 году. Его автор — человек или группа людей под псевдонимом Сатоши Накамото — до сих пор неизвестны. В январе 2009 года был добыт первый блок (Genesis Block), а первая реальная транзакция состоялась в мае 2010 года: 10 000 BTC были уплачены за две пиццы.\n\nПочему Bitcoin особенный:\n• Максимальный лимит — ровно 21 миллион монет. Больше никогда не будет создано. Это жёсткий дефляционный механизм, встроенный в код\n• Халвинг — каждые 210 000 блоков (~4 года) вознаграждение майнерам уменьшается вдвое. Это снижает скорость эмиссии и исторически предшествует сильным бычьим циклам\n• Наибольшая капитализация и ликвидность среди всех криптовалют\n• Принят как платёжное средство в ряде стран, включая Сальвадор\n• Хранится институциональными инвесторами как защитный актив наравне с золотом\n\nBitcoin часто называют «цифровым золотом» — не потому что им платят за покупки, а потому что он служит средством долгосрочного сохранения стоимости в условиях инфляции традиционных валют.' },
          { h: 'Ethereum и смарт-контракты', b: 'Ethereum (ETH) — вторая по капитализации криптовалюта, запущенная в 2015 году разработчиком Виталиком Бутериным. Если Bitcoin — это цифровые деньги, то Ethereum — это программируемый блокчейн, глобальный компьютер без центра управления.\n\nСмарт-контракт — это программа, которая хранится на блокчейне и автоматически выполняется при наступлении заданных условий. Никто не может её остановить или изменить после деплоя. Примеры:\n• «Перевести 1 ETH на адрес X, если адрес Y отправил документ до даты Z»\n• «Распределить прибыль протокола между держателями токена пропорционально их доле»\n\nНа Ethereum построена большая часть крипто-экосистемы:\n• DeFi — децентрализованные биржи, кредитные протоколы, стейблкоины\n• NFT — стандарты ERC-721 и ERC-1155\n• DAO — децентрализованные автономные организации\n• Layer 2 решения — Arbitrum, Optimism, Polygon для масштабирования\n\nВ 2022 году Ethereum перешёл с Proof-of-Work на Proof-of-Stake, снизив потребление энергии на 99.95%.' },
          { h: 'Альткоины — всё кроме Bitcoin', b: 'Альткоин (alternative coin) — любая криптовалюта кроме Bitcoin. Их существуют тысячи, и они решают самые разные задачи.\n\nОсновные категории:\n• Платформы для смарт-контрактов: Ethereum, Solana, BNB Chain, Avalanche, Cardano — конкурируют за разработчиков и пользователей dApps\n• Стейблкоины: USDT, USDC, DAI — привязаны к доллару, используются для торговли и хранения без волатильности\n• DeFi-токены: токены децентрализованных протоколов (Uniswap, Aave, Compound)\n• Мем-коины: Dogecoin, Shiba Inu — изначально шуточные, но набравшие огромную аудиторию\n• Токены проектов: представляют долю в конкретном продукте или дают права управления\n\nВажно понимать: большинство альткоинов сильно коррелирует с Bitcoin. Когда BTC падает — альткоины падают сильнее. Когда BTC растёт — альткоины растут быстрее, но и риски выше.' },
        ]},
        { id: 'market', title: 'Как устроен криптовалютный рынок', sections: [
          { h: 'Биржи — где происходит торговля', b: 'Криптовалютная биржа — платформа где покупатели и продавцы выставляют заявки, а система их сводит. Существуют два типа:\n\nЦентрализованные биржи (CEX): Binance, Bybit, OKX, Coinbase, Kraken. Работают как традиционные биржи — компания-оператор хранит средства и ведёт книгу ордеров. Плюсы: скорость, удобство, глубокий стакан. Минусы: нужна верификация (KYC), средства на хранении у третьей стороны.\n\nДецентрализованные биржи (DEX): Uniswap, dYdX, Curve. Работают через смарт-контракты напрямую из кошелька. Верификация не нужна, средства всегда у вас. Минусы: выше комиссии, меньше ликвидности для редких пар.\n\nЛиквидность — ключевой параметр биржи. Чем больше участников и объём торгов, тем легче купить или продать большой объём без значительного сдвига цены. На Binance и Bybit ликвидность по топовым парам исчисляется миллиардами долларов в сутки.' },
          { h: 'Спот, фьючерсы и маржинальная торговля', b: 'Спот-торговля — самый простой тип. Вы покупаете монету и становитесь её владельцем. Если купили 1 BTC — у вас есть 1 BTC. Прибыль или убыток фиксируется только при продаже.\n\nФьючерсы — контракты на будущую цену актива. Вы не покупаете саму монету, а торгуете контрактом. Это открывает две важные возможности:\n• Лонг (Long) — ставка на рост цены\n• Шорт (Short) — ставка на падение цены, можно зарабатывать на снижении\n• Кредитное плечо — торговать объёмом в 10, 20, 50 и более раз больше имеющихся средств\n\nПерпетуальные фьючерсы (Perpetual Swaps) — бессрочные контракты без даты экспирации. Самый популярный инструмент для активной торговли на Bybit и Binance.\n\nФандинг — плата за удержание позиции в перпетуальных фьючерсах. Каждые 8 часов лонги платят шортам (или наоборот) в зависимости от того, какая сторона перегружена. Это механизм привязки цены контракта к спотовой.' },
          { h: 'Рыночная капитализация и объём торгов', b: 'Рыночная капитализация (Market Cap) = текущая цена × количество монет в обращении.\n\nКлассификация по капитализации:\n• Large Cap (>$10 млрд) — Bitcoin, Ethereum, BNB. Наибольшая стабильность, ликвидность, меньшая волатильность\n• Mid Cap ($1–10 млрд) — устоявшиеся проекты с реальной базой пользователей. Баланс между риском и потенциалом\n• Small Cap (<$1 млрд) — высокий потенциал роста, высокий риск. Манипуляции ценой возможны при малом объёме\n\nОбъём торгов (Volume) — суммарный оборот за период. Высокий объём при движении цены подтверждает сигнал. Низкий объём при росте — признак слабости движения.\n\nFully Diluted Valuation (FDV) — капитализация с учётом всех монет, которые будут выпущены в будущем. Важный показатель: если FDV в 10 раз выше текущей капитализации — значит впереди большая эмиссия, которая будет давить на цену.' },
          { h: 'Что движет ценой криптовалюты', b: 'Цена криптовалюты определяется балансом спроса и предложения в каждый момент времени. На этот баланс влияет множество факторов:\n\nМакроэкономика:\n• Ставки центральных банков — при высоких ставках инвесторы уходят в облигации, крипта падает\n• Инфляция — высокая инфляция толкает инвесторов в защитные активы, включая BTC\n• Ликвидность рынков — сколько денег в системе в целом\n\nСобытия крипто-рынка:\n• Халвинг Bitcoin — исторически запускает бычий цикл через 6–12 месяцев\n• Листинг на крупной бирже — краткосрочный рост на 20–50%\n• Взломы и эксплойты — обвал не только взломанного проекта, но и всего рынка\n• Регуляторные новости — решения SEC, запреты или легализация в крупных странах\n\nКрупные игроки (киты):\n• Кошельки с балансом >1000 BTC отслеживаются on-chain аналитиками\n• Перемещение крупных сумм на биржи — сигнал возможной продажи\n• Накопление в холодных кошельках — сигнал долгосрочного удержания\n\nПсихология толпы:\n• Страх (FUD) и жадность (FOMO) — главные эмоциональные двигатели цены\n• Индекс страха и жадности (Fear & Greed Index) — от 0 (крайний страх) до 100 (крайняя жадность)\n• Экстремальный страх исторически означает хорошее время для покупки, экстремальная жадность — для фиксации прибыли' },
          { h: 'Рыночные циклы', b: 'Криптовалютный рынок движется в чётко выраженных циклах, исторически привязанных к халвингу Bitcoin.\n\nФазы цикла:\n1. Накопление — цена долго стоит на дне, объёмы низкие. Крупные игроки тихо накапливают позиции\n2. Рост — цена начинает медленно расти, новости улучшаются, приходят новые инвесторы\n3. Эйфория — цена резко ускоряется, каждый разговор о крипте, FOMO максимальный. Именно здесь умные деньги начинают продавать\n4. Распределение — цена топчется на пике, крупные игроки выходят\n5. Коррекция — падение на 60–90% от пика. Большинство розничных инвесторов держат убыточные позиции\n6. Боковик — долгая консолидация перед следующим накоплением\n\nПонимание циклов не даёт возможности точно предсказать пики и дно — но помогает не покупать на эйфории и не продавать в панике.' },
        ]},
        { id: 'ta-fa', title: 'Технический и фундаментальный анализ', sections: [
          { h: 'Технический анализ — основы', b: 'Технический анализ (ТА) — метод прогнозирования движения цены на основе изучения исторических данных: графиков, объёмов и паттернов. Ключевая идея: всё что влияет на цену уже отражено в цене, а история повторяется, потому что человеческая психология не меняется.\n\nТри кита технического анализа:\n1. Рынок учитывает всё — фундаментальные данные, новости, настроения — всё это уже в цене\n2. Цены движутся в трендах — тренд проще продолжить чем развернуть\n3. История повторяется — одни и те же паттерны работают снова и снова на разных инструментах и таймфреймах\n\nТА не даёт точных предсказаний — он работает с вероятностями. Хороший технический аналитик не говорит «цена точно вырастет», он говорит «по данной конфигурации вероятность роста выше чем падения, и я знаю где окажусь неправ».' },
          { h: 'Уровни поддержки и сопротивления', b: 'Уровни — фундамент технического анализа. Поддержка — ценовая зона где спрос исторически превышал предложение и цена разворачивалась вверх. Сопротивление — зона где предложение побеждало спрос и цена разворачивалась вниз.\n\nКак определять уровни:\n• Исторические максимумы и минимумы — цена помнит где была\n• Зоны высокого объёма — где прошло много сделок\n• Круглые числа ($50 000, $100 000 для BTC) — психологически значимые отметки\n• Предыдущие зоны консолидации — боковики часто становятся поддержкой/сопротивлением\n\nПравило смены ролей: пробитое сопротивление становится поддержкой, пробитая поддержка — сопротивлением. Это один из самых надёжных принципов технического анализа.\n\nЧем больше касаний уровня — тем он значимее. Уровень с 5 касаниями сильнее уровня с 2 касаниями.' },
          { h: 'Свечной анализ и паттерны', b: 'Японские свечи — основной способ отображения цены. Каждая свеча показывает 4 значения за период: открытие, максимум, минимум, закрытие. Тело свечи — расстояние между открытием и закрытием. Тени (фитили) — крайние значения.\n\nОдиночные паттерны:\n• Молот — маленькое тело вверху, длинная нижняя тень. Покупатели выкупили снижение — разворотный сигнал на дне\n• Падающая звезда — маленькое тело внизу, длинная верхняя тень. Продавцы продавили рост — разворотный сигнал на вершине\n• Доджи — открытие и закрытие почти совпадают. Равновесие сил, возможный разворот\n• Марибозу — длинное тело без теней. Сильное направленное движение без откатов\n\nДвойные паттерны:\n• Бычье поглощение — красная свеча полностью «поглощается» зелёной. Быки взяли контроль\n• Медвежье поглощение — зеркально, разворот вниз\n• Харами — маленькая свеча внутри большой. Неопределённость, замедление тренда\n\nТройные паттерны:\n• Три белых солдата — три последовательных зелёных свечи с закрытием у максимума. Подтверждение восходящего тренда\n• Три чёрных вороны — зеркально, подтверждение нисходящего\n• Утренняя звезда — три свечи: большая красная, маленькая доджи, большая зелёная. Разворот вверх' },
          { h: 'Индикаторы технического анализа', b: 'Индикаторы — математические формулы применённые к ценовым данным. Делятся на трендовые (следят за направлением) и осцилляторы (измеряют перегрев).\n\nСкользящие средние (MA):\nSMA — простое среднее за N периодов. EMA — экспоненциальное, больший вес у свежих данных. Используются для определения тренда и уровней динамической поддержки/сопротивления. MA20 — краткосрочный тренд, MA50 — среднесрочный, MA200 — долгосрочный.\n\nRSI (Relative Strength Index):\nОсциллятор от 0 до 100. Выше 70 — актив перекуплен (возможная коррекция). Ниже 30 — перепродан (возможный отскок). Дивергенция между RSI и ценой — один из сильнейших сигналов разворота.\n\nMACD:\nРазница между EMA12 и EMA26. Когда линия MACD пересекает сигнальную снизу вверх — сигнал на покупку. Гистограмма показывает силу импульса.\n\nBollinger Bands:\nСредняя скользящая + две полосы на расстоянии 2 стандартных отклонения. При сужении полос ожидается сильное движение. Выход цены за полосу — сигнал экстремального движения.\n\nVolume Profile:\nРаспределение объёма по ценовым уровням. Зоны высокого объёма — сильные поддержки/сопротивления. Зоны низкого объёма — цена проходит их быстро.' },
          { h: 'Фундаментальный анализ в крипте', b: 'Фундаментальный анализ (ФА) — оценка реальной ценности проекта, а не движения его графика. В отличие от акций, у криптовалют нет прибыли и дивидендов, поэтому ФА здесь имеет свою специфику.\n\nЧто оцениваем:\n\nТехнология и продукт:\n• Какую реальную проблему решает проект?\n• Есть ли рабочий продукт или только белая бумага?\n• Уникальность — чем отличается от конкурентов?\n• Технический аудит — был ли код проверен независимыми аудиторами?\n\nКоманда:\n• Публичность — анонимные команды несут меньше ответственности\n• Опыт — работали ли они в крупных компаниях или успешных крипто-проектах?\n• Активность в GitHub — регулярно ли обновляется код?\n\nТокеномика:\n• Максимальный supply — сколько монет будет существовать\n• Распределение — какой процент у команды, инвесторов, общества\n• Vesting — когда команда и инвесторы могут продать свои токены (разлок)\n• Инфляция/дефляция — механизмы сжигания или дополнительной эмиссии\n\nАдопция:\n• TVL (Total Value Locked) для DeFi-протоколов\n• Количество активных адресов\n• Транзакционная активность\n• Партнёрства и интеграции' },
        ]},
        { id: 'risks', title: 'Риски и безопасность', sections: [
          { h: 'Рыночные риски', b: 'Криптовалюта — один из самых волатильных классов активов в мире. Bitcoin может упасть на 30% за неделю и вырасти на 50% за месяц. Альткоины движутся ещё агрессивнее.\n\nОсновные рыночные риски:\n• Волатильность — резкие движения цены в обе стороны\n• Ликвидационный риск — при использовании плеча позиция закрывается принудительно при достижении уровня ликвидации\n• Корреляция — большинство монет падает одновременно с Bitcoin\n• Регуляторный риск — страны могут запретить или ограничить работу с криптовалютой\n• Технологический риск — ошибки в коде протокола могут привести к потере средств\n\nПравило №1: никогда не вкладывайте больше, чем готовы потерять полностью. Криптовалюта — это не банковский вклад.' },
          { h: 'Мошенничество — виды и защита', b: 'Крипто-пространство привлекает мошенников из-за необратимости транзакций и анонимности. Знание схем — лучшая защита.\n\nPump & Dump:\nОрганизаторы тихо скупают малоликвидную монету, затем запускают агрессивный маркетинг в Telegram-каналах и социальных сетях. Цена взлетает — розничные инвесторы покупают на FOMO — организаторы продают на пике. Цена обваливается в 5–10 раз.\n\nРуг-пул (Rug Pull):\nКоманда запускает проект, собирает средства инвесторов через IDO или liquidity pool, затем внезапно выводит все средства и исчезает. Признаки: анонимная команда, нет аудита кода, огромные обещания доходности.\n\nФишинг:\nПоддельные сайты бирж, кошельков, DeFi-протоколов. Вводите seed-фразу или приватный ключ — средства уходят немедленно. Всегда проверяйте URL, используйте закладки браузера для важных сайтов.\n\nScam-проекты:\nКрасивый сайт, белая бумага, активные соцсети — но нет реального продукта. Проверяйте GitHub: если репозиторий пустой или последний коммит был год назад — красный флаг.\n\nГарантированный доход:\nВ крипте нет гарантий. «Вложи 1 BTC — получи 2 BTC» — это мошенничество без исключений. Схемы Понци работают пока приходят новые деньги.' },
          { h: 'Безопасное хранение криптовалюты', b: 'Ключевой принцип: не ваши ключи — не ваши монеты. Если криптовалюта лежит на бирже, технически она принадлежит бирже. Биржи взламывают, они банкротятся (FTX в 2022 году — $8 млрд потерь клиентов).\n\nХолодные кошельки (Hardware Wallet):\nФизическое устройство (Ledger, Trezor) хранит приватные ключи офлайн. Для подтверждения транзакции нужно физически нажать кнопку на устройстве. Это наиболее безопасный способ для долгосрочного хранения крупных сумм.\n\nГорячие кошельки (Software Wallet):\nMobile или desktop приложения (MetaMask, Trust Wallet, Phantom). Удобны для активного использования DeFi. Риск выше чем у холодных — уязвимы для вредоносного ПО.\n\nБиржевое хранение:\nДопустимо только для рабочего капитала — средств которые вы активно используете для торговли. Долгосрочные накопления на биржах держать не стоит.\n\nSeed-фраза (мнемоника):\n12 или 24 слова которые являются мастер-ключом к кошельку. Записывайте только на бумагу, храните в нескольких местах. Никогда не фотографируйте, не вводите на сайтах, не отправляйте в мессенджерах. Кто знает seed — тот владеет кошельком.' },
          { h: 'Безопасность при торговле', b: 'API-ключи:\nПри подключении терминала к бирже через API — создавайте ключи только с правами на торговлю. Никогда не давайте разрешение на вывод средств. Если ключ скомпрометирован — максимум что потеряете это открытые позиции, но не сам капитал.\n\nДвухфакторная аутентификация (2FA):\nВключите 2FA на всех биржах и кошельках. Используйте приложение-аутентификатор (Google Authenticator, Authy) вместо SMS — SMS можно перехватить через атаку на SIM-карту.\n\nФишинговые атаки:\nВсегда проверяйте адресную строку браузера. Binance.com и Bínance.com — разные домены. Мошенники используют похожие символы из других алфавитов. Используйте только официальные ссылки с официальных сайтов.\n\nПубличный Wi-Fi:\nНикогда не проводите транзакции через незащищённые публичные сети. Используйте VPN или мобильный интернет.' },
        ]},
        { id: 'trading-styles', title: 'Стили торговли', sections: [
          { h: 'Скальпинг', b: 'Скальпинг — торговля на сверхкоротких движениях цены. Позиция удерживается от нескольких секунд до нескольких минут. Цель каждой сделки — небольшая прибыль (0.1–0.5%), но при высоком количестве сделок (10–50+ в день) это складывается в значимый результат.\n\nЧто нужно для скальпинга:\n• Скорость исполнения — каждая миллисекунда имеет значение, поэтому важен качественный терминал\n• Низкие комиссии — при большом количестве сделок комиссии съедают прибыль. Используйте лимитные ордера (maker) вместо рыночных (taker)\n• Высокая ликвидность — торгуйте только топовыми парами с глубоким стаканом (BTC, ETH, SOL)\n• Дисциплина — стоп-лосс всегда, без исключений\n• Концентрация — скальпинг требует полного внимания, нельзя отвлекаться\n\nТаймфреймы: 1м, 5м. Иногда тиковые графики.\n\nВ TRYVEX скальпинг-модуль создан специально для этого стиля: несколько панелей с разными инструментами, горячие клавиши для мгновенных входов, горизонтальный стакан для максимального обзора, синхронизация со скринерами.' },
          { h: 'Дейтрейдинг', b: 'Дейтрейдер открывает и закрывает все позиции в течение одного торгового дня. Никаких открытых позиций на ночь — нет риска ночных гэпов и неожиданных новостей.\n\nПреимущества:\n• Нет свопа (платы за перенос позиции через ночь)\n• Более предсказуемые условия — торгуете в рамках одной сессии\n• Быстрая обратная связь — результат виден каждый день\n\nСложности:\n• Требует 3–6 часов активного внимания у экрана\n• Высокий психологический стресс — много решений за день\n• Комиссии выше чем у свинг-трейдинга при том же объёме прибыли\n\nТаймфреймы: 5м, 15м, 1ч для входов. 4ч, 1д для общего контекста.\n\nЧто торговать: активные фьючерсные пары с высоким объёмом. Лучшее время — первые 2–3 часа после открытия американской сессии (15:30–18:00 МСК).' },
          { h: 'Свинг-трейдинг', b: 'Свинг-трейдер удерживает позиции от нескольких дней до нескольких недель, стремясь поймать одно большое движение внутри тренда или между уровнями.\n\nПочему многие выбирают свинг:\n• Не нужно сидеть у экрана — достаточно проверять раз в день\n• Меньше сделок — меньше комиссий, меньше стресса\n• Комфортно совмещать с основной работой\n• Соотношение риск/прибыль обычно лучше чем у скальпинга\n\nСтратегия:\nВход на откатах в рамках тренда или на пробое уровня. Стоп-лосс ниже ключевой поддержки. Тейк-профит на следующем уровне сопротивления или по трейлингу.\n\nТаймфреймы: 4ч, 1д для входов. 1нед для общей картины.\n\nГлавный враг свинг-трейдера — ночные новости и выходные. Фундаментальные события (решения ФРС, крупные хаки) могут полностью сломать технический сетап за одну ночь. Поэтому размер позиции и стоп-лосс особенно важны.' },
          { h: 'Позиционная торговля', b: 'Позиционный трейдер держит активы месяцами. Цель — поймать крупную трендовую волну, игнорируя краткосрочную волатильность.\n\nОтличие от HODLing:\nHODL — просто купить и держать. Позиционная торговля — активное управление: выбор точки входа, установка широкого стоп-лосса, частичная фиксация на ключевых уровнях.\n\nКогда это работает:\n• В начале бычьего цикла после халвинга Bitcoin\n• При покупке в зоне глубокой коррекции (-60–80% от максимума)\n• В активах с сильным фундаменталом и чётким нарративом роста\n\nТаймфреймы: 1нед, 1мес. Технический анализ используется для определения точки входа, а не для ежедневного управления.\n\nПсихология: главное испытание — пересидеть просадки 20–40% которые неизбежны даже в бычьем тренде. Без чёткого плана и понимания почему вы держите позицию — это невозможно.' },
          { h: 'Как выбрать свой стиль торговли', b: 'Не существует «лучшего» стиля — каждый подходит разным людям в разных ситуациях. Вопросы для выбора:\n\nСколько времени вы готовы посвящать торговле?\n• Несколько часов в день — скальпинг или дейтрейдинг\n• 30–60 минут — свинг-трейдинг\n• 5–10 минут — позиционная торговля\n\nКакой у вас темперамент?\n• Любите быстрые решения и адреналин — скальпинг\n• Предпочитаете обдуманные действия — свинг или позиционная\n\nКакой капитал?\n• Маленький (<$1 000) — комиссии при скальпинге могут съесть прибыль, лучше свинг\n• Большой — любой стиль, но диверсификация обязательна\n\nРекомендация для новичков: начните со свинг-трейдинга. Меньше стресса, больше времени на анализ каждой сделки, легче учиться на ошибках. Освоив базовые принципы — переходите к более активным стилям если хотите.' },
        ]},
        { id: 'risk-management', title: 'Управление рисками', sections: [
          { h: 'Почему риск-менеджмент важнее точности входа', b: 'Большинство начинающих трейдеров одержимы поиском «идеального входа». Профессионалы сосредоточены на управлении риском. Почему?\n\nМатематика на вашей стороне:\nЕсли ваш средний убыток = 1%, а средняя прибыль = 2% (соотношение 1:2), то при точности входа всего 40% вы в плюсе:\n40 прибыльных сделок × 2% = +80%\n60 убыточных сделок × 1% = -60%\nИтог: +20% даже при большинстве убыточных сделок.\n\nПри соотношении 1:3 достаточно угадывать лишь 25% сделок чтобы оставаться в прибыли.\n\nЗолотое правило: никогда не входите в сделку если потенциальная прибыль менее чем вдвое превышает допустимый убыток. Если стоп стоит в 1% от цены входа — тейк-профит должен быть минимум в 2% выше.' },
          { h: 'Размер позиции', b: 'Размер позиции — самый важный параметр управления рисками. Именно он определяет сколько вы потеряете если сделка пойдёт против вас.\n\nФормула риска на сделку:\nРиск на сделку = Размер позиции × Расстояние до стоп-лосса\n\nПример:\nДепозит $10 000. Риск на сделку — 1% = $100.\nЦена входа в BTC: $50 000. Стоп: $49 500 (1% ниже).\nМаксимальный размер позиции: $100 / 1% = $10 000 (или 0.2 BTC).\n\nОбщие правила:\n• Не рискуйте более 1–2% капитала в одной сделке\n• При серии убытков уменьшайте размер, не увеличивайте\n• Никогда не усредняйте убыточную позицию без чёткого плана\n• Суммарный открытый риск по всем позициям — не более 5–10% депозита' },
          { h: 'Стоп-лосс — обязательный элемент', b: 'Стоп-лосс — ордер который автоматически закрывает позицию при достижении заданного уровня убытка. Это не просто инструмент — это принцип торговли.\n\nПравила стоп-лосса:\n• Определяйте стоп до входа в сделку, а не после\n• Размещайте стоп за значимым уровнем (поддержка, сопротивление, локальный минимум/максимум)\n• Никогда не передвигайте стоп дальше от цены входа — только к безубытку или в сторону прибыли\n• Не снимайте стоп «пока рынок не развернётся» — это главная ошибка которая уничтожает депозиты\n\nВиды стопов:\nФиксированный стоп — на конкретном ценовом уровне.\nТрейлинг-стоп — следует за ценой на заданном расстоянии, автоматически фиксирует прибыль при развороте.\nВременной стоп — закрыть позицию если она не достигла цели за N свечей (говорит о том что идея не работает).\n\nВ TRYVEX трейлинг-стоп реализован в стратегии TrailingAdd — робот автоматически сдвигает стоп по мере движения цены в вашу сторону.' },
          { h: 'Кредитное плечо — как не потерять всё', b: 'Плечо — инструмент для увеличения потенциальной прибыли, который одновременно кратно увеличивает риск.\n\nКак работает ликвидация:\nПри плече ×10 движение цены на 10% против вас = потеря 100% маржи (ликвидация).\nПри плече ×20 хватит движения в 5%.\nПри плече ×100 — уже 1%.\n\nВ крипте движения на 3–10% внутри дня — норма. Это делает высокое плечо экстремально опасным.\n\nРазумное использование плеча:\n• Новичкам — не более ×3–5\n• Опытным трейдерам — ×5–10 при коротком удержании и жёстком стопе\n• Плечо ×20 и выше — только для очень коротких сделок с минимальным риском на капитал\n\nПлечо не увеличивает вашу точность — оно увеличивает цену ошибки. Профессионалы используют умеренное плечо и большую часть прибыли берут за счёт точности входа и управления позицией, а не за счёт плеча.' },
          { h: 'Психология трейдера', b: 'Психология — то где большинство теряют деньги даже при правильной системе. Рынок создаёт ситуации которые провоцируют именно те решения которые приведут к убытку.\n\nFOMO (Fear Of Missing Out):\nВидите сильное движение которое уже прошло 10%. Хочется запрыгнуть. Именно в этот момент профессионалы выходят, а новички входят. Решение: если пропустили вход — ждите следующую возможность. Рынок всегда даёт новые.\n\nМесть рынку:\nПосле убытка хочется «отыграться» — немедленно открыть следующую сделку с увеличенным размером. Это самый быстрый способ превратить один убыток в серию. Решение: после убытка — пауза. Минимум 30 минут, лучше — весь день.\n\nЖадность:\nПрибыльная позиция достигла цели, но «ещё чуть-чуть дойдёт». Рынок разворачивается, прибыль сокращается, вы фиксируете меньше чем планировали или уходите в убыток. Решение: тейк-профит по плану, частичная фиксация на первой цели.\n\nПаралич анализа:\nСтолько индикаторов, столько противоречивых сигналов — решение принять невозможно. Решение: упростить систему до 2–3 критериев входа.\n\nТорговый журнал:\nЗаписывайте каждую сделку: инструмент, направление, причина входа, уровень стопа и тейка, результат, заметки. Через 50–100 сделок вы увидите паттерны своих ошибок — это невозможно увидеть без журнала.' },
        ]},
        { id: 'earning', title: 'Способы участия в крипторынке', sections: [
          { h: 'Активная торговля', b: 'Спот и фьючерсная торговля — покупка и продажа активов с целью заработать на изменении цены. Это самый известный, но далеко не единственный способ участвовать в крипторынке.\n\nСпот-торговля:\nВы покупаете монету и владеете ею. Прибыль = разница цен продажи и покупки. Подходит для среднесрочных и долгосрочных позиций. Нет риска ликвидации.\n\nФьючерсная торговля:\nТоргуете контрактами без владения активом. Доступны лонги (на рост) и шорты (на падение), кредитное плечо. Потенциально более высокая доходность при большем риске.\n\nЧто нужно для успеха:\n• Понимание технического анализа\n• Чёткая торговая система с правилами входа и выхода\n• Жёсткое управление рисками\n• Дисциплина следовать плану, а не эмоциям\n• Торговый журнал для анализа результатов\n\nВ TRYVEX вы можете торговать на Bybit и Binance прямо из терминала — стакан, график и торговая панель в одном окне.' },
          { h: 'Стейкинг и пассивный доход', b: 'Стейкинг — блокировка криптовалюты в сети или протоколе для получения вознаграждения. Подходит тем кто не хочет активно торговать.\n\nNative Staking (стейкинг сети):\nБлокируете монеты в блокчейне с Proof-of-Stake (Ethereum, Cardano, Solana). Становитесь валидатором или делегируете токены валидатору. Доходность: 3–8% годовых.\n\nLiquid Staking:\nПолучаете ликвидный токен взамен заблокированных (stETH вместо ETH). Можно одновременно и получать стейкинг-вознаграждение, и использовать средства в DeFi. Протоколы: Lido, Rocket Pool.\n\nCentralized Staking (на бирже):\nBinance Earn, Bybit Savings — простейший способ. Вы просто держите монеты в продукте биржи и получаете процент. Удобно но есть риск биржи.\n\nYield Farming в DeFi:\nПредоставляете ликвидность в пулы децентрализованных бирж и получаете комиссии от торгов. Доходность может быть очень высокой, но есть специфические риски: impermanent loss, риск смарт-контракта.\n\nВажно: всегда оценивайте реальную доходность с учётом волатильности самой монеты. 20% годовых в токене который упал на 80% — это убыток.' },
          { h: 'DCA — стратегия для долгосрочных инвесторов', b: 'Dollar Cost Averaging (DCA) — регулярная покупка фиксированной суммы актива независимо от текущей цены. Это простейшая и одна из наиболее эффективных долгосрочных стратегий.\n\nКак работает:\nВы покупаете на $100 каждую неделю независимо от цены. Когда цена высокая — покупаете меньше монет. Когда низкая — больше. Со временем средняя цена покупки оказывается ниже чем если бы вы купили всё разом на пике.\n\nПример (упрощённый):\nНеделя 1: BTC = $40 000, куплено 0.0025 BTC\nНеделя 2: BTC = $30 000, куплено 0.0033 BTC\nНеделя 3: BTC = $50 000, куплено 0.002 BTC\nСредняя цена: $300 / 0.0078 BTC = $38 460 — ниже чем два из трёх моментов\n\nДля кого подходит:\n• Нет времени следить за рынком\n• Инвестируете часть зарплаты регулярно\n• Горизонт — 2–5 лет и более\n• Верите в долгосрочный рост Bitcoin или Ethereum\n\nПсихологическое преимущество DCA — вы не пытаетесь «угадать дно». Это снижает стресс и устраняет ошибки тайминга.' },
          { h: 'Алготрейдинг', b: 'Алгоритмическая торговля — автоматическое исполнение торговых стратегий без участия человека. Программа следует строгим правилам: когда входить, как управлять позицией, когда выходить.\n\nПреимущества перед ручной торговлей:\n• Работает 24/7 — крипторынок не спит, робот тоже\n• Нет эмоций — строго следует стратегии без FOMO и паники\n• Мгновенная реакция — миллисекунды против секунд у человека\n• Бэктест — можно проверить стратегию на годах исторических данных до запуска\n• Диверсификация — несколько роботов на разных инструментах одновременно\n\nВиды алгоритмических стратегий:\n• Трендовые — следование тренду по сигналам индикаторов\n• Сеточные — покупки при снижении, продажи при росте через равные интервалы\n• Арбитражные — использование разницы цен между биржами\n• Маркет-мейкинг — постоянное поддержание заявок bid и ask\n\nВ TRYVEX алготрейдинг доступен в тарифе Pro. Вы можете использовать готовые стратегии из библиотеки или написать собственную на C# прямо в терминале. Если нет навыков программирования — закажите бота у нас, мы реализуем любую идею.' },
          { h: 'Арбитраж', b: 'Арбитраж — одновременная покупка актива там где дешевле и продажа там где дороже, для получения безрисковой (теоретически) прибыли на разнице цен.\n\nВиды криптоарбитража:\n\nМежбиржевой арбитраж:\nBTC стоит $50 000 на Binance и $50 050 на Coinbase. Купить на Binance, продать на Coinbase, заработать $50 минус комиссии. На практике разница минимальна и требует автоматизации.\n\nТриангулярный арбитраж:\nВнутри одной биржи: BTC → ETH → USDT → BTC. Если цепочка обменов даёт больше чем начали — прибыль. Окна закрываются за миллисекунды, нужны боты.\n\nFunding Rate Арбитраж:\nЕсли фандинг по перпетуальным фьючерсам очень высокий (лонги платят шортам) — открываем шорт на фьючерсах и хедж-лонг на споте. Зарабатываем фандинг при нейтральной позиции.\n\nLead-Lag арбитраж:\nНекоторые инструменты движутся раньше других. Алгоритм отслеживает «лидера» и торгует «лаггером» в ту же сторону. Реализован в терминале TRYVEX как стратегия BinanceLeadBot.' },
        ]},
        { id: 'defi', title: 'DeFi, NFT и Web3', sections: [
          { h: 'DeFi — децентрализованные финансы', b: 'DeFi (Decentralized Finance) — финансовые сервисы построенные на блокчейне, работающие без банков, брокеров и других посредников. Все операции выполняются смарт-контрактами автоматически.\n\nОсновные категории DeFi:\n\nДецентрализованные биржи (DEX):\nUniswap, Curve, dYdX — торговля токенами напрямую из кошелька. Не нужна регистрация и верификация. Работают через пулы ликвидности (AMM — Automated Market Maker): ликвидность обеспечивают пользователи, которые получают комиссию от торгов.\n\nДецентрализованное кредитование:\nAave, Compound — берёте кредит под залог криптовалюты или даёте деньги в долг и получаете проценты. Всё автоматически через смарт-контракты. Ставки определяются алгоритмически в зависимости от спроса.\n\nСтейблкоины:\nUSDT, USDC — централизованные, обеспечены реальными долларами. DAI — децентрализованный, обеспечен залогом в ETH. Используются как «тихая гавань» внутри крипто-экосистемы.\n\nРиски DeFi:\n• Риск смарт-контракта — баги в коде могут привести к потере всех средств протокола\n• Impermanent Loss — при предоставлении ликвидности в AMM если цена активов расходится, вы теряете по сравнению с простым удержанием\n• Риск управления — токены управления дают власть над протоколом, злоупотребления возможны' },
          { h: 'NFT — цифровая собственность', b: 'NFT (Non-Fungible Token) — уникальный цифровой актив на блокчейне. В отличие от обычных токенов (BTC, ETH) которые взаимозаменяемы (один BTC = другому BTC), каждый NFT уникален и не имеет аналогов.\n\nКак работает NFT:\nСмарт-контракт записывает в блокчейн информацию о том что конкретный кошельков-адрес является владельцем конкретного уникального токена. Это криптографически верифицированное доказательство права собственности.\n\nПрименения NFT:\n• Цифровое искусство — художники продают работы напрямую коллекционерам без галерей, получая процент от каждой перепродажи\n• Игровые предметы — оружие, скины, земли в метавселенных (Axie Infinity, Decentraland)\n• Членство и доступ — NFT как билет в закрытое сообщество или мероприятие\n• Документы и сертификаты — дипломы, права собственности на недвижимость\n\nРеальность рынка NFT:\nВ 2021–2022 годах рынок NFT переживал огромный спекулятивный пузырь. Большинство проектов потеряло 95–99% стоимости. Сейчас рынок более зрелый: ценность сохраняют проекты с реальным utility и устойчивыми сообществами.' },
          { h: 'Web3 — следующее поколение интернета', b: 'Web3 — концепция нового интернета построенного на блокчейн-технологиях, где пользователи контролируют свои данные и цифровые активы.\n\nЭволюция интернета:\n• Web1 (1990-е–2000-е) — читаемый. Статичные сайты, пользователи только потребляют контент\n• Web2 (2000-е–сейчас) — читаемый + писаемый. Социальные сети, пользовательский контент. Но данные принадлежат платформам (Google, Facebook, Twitter)\n• Web3 — читаемый + писаемый + владеемый. Пользователь владеет своими данными, активами и идентичностью\n\nКлючевые концепции Web3:\n\nСамосуверенная идентичность (DID):\nВаша цифровая личность привязана к кошельку, а не к аккаунту в Google или Facebook. Одна идентичность для всех приложений.\n\nDAO (Decentralized Autonomous Organization):\nОрганизация управляемая смарт-контрактами и токен-голосованием. Нет CEO, нет совета директоров — решения принимаются держателями токенов управления.\n\nМетавселенные:\nВиртуальные миры где активы (земля, предметы, строения) существуют как NFT на блокчейне и имеют реальную ценность.\n\nТекущий статус:\nWeb3 всё ещё в ранней стадии. Много хайпа, много реальных проблем с удобством использования. Но фундаментальные идеи цифровой собственности и децентрализации продолжают развиваться.' },
        ]},
      ]
        { id: 'market-participants', title: 'Участники рынка', sections: [
          { h: 'Кто торгует на крипторынке', b: 'Понимание того кто стоит по другую сторону каждой вашей сделки — одно из ключевых преимуществ профессионального трейдера. Рынок не абстракция — это миллионы решений конкретных людей и алгоритмов.\n\nРозничные трейдеры (Retail):\nФизические лица торгующие собственным капиталом. Большинство участников по количеству, меньшинство по объёму. Склонны к эмоциональным решениям — покупают на пике эйфории, продают в панике на дне. Именно их деньги в конечном счёте перераспределяются к более подготовленным участникам.\n\nИнституциональные инвесторы:\nХедж-фонды, инвестиционные банки, пенсионные фонды, корпоративные казначейства. Управляют миллиардами долларов. Торгуют через OTC (внебиржевые сделки) чтобы не двигать цену своими объёмами. Их накопление/распределение видно на графике в виде длинных боковых консолидаций.\n\nМаркет-мейкеры:\nПрофессиональные участники которые постоянно держат заявки на покупку и продажу, обеспечивая ликвидность рынка. Зарабатывают на спреде между bid и ask. Биржа платит им за это или снижает комиссии. Маркет-мейкеры не заинтересованы в направлении цены — им важен объём.\n\nКиты (Whales):\nФизические лица или организации владеющие настолько большим количеством монет, что их действия способны двигать цену. Для Bitcoin кит — это кошелёк с более чем 1000 BTC. Активность китов отслеживается через on-chain аналитику.' },
          { h: 'Киты — как они управляют рынком', b: 'Кит не может просто «продать всё» — его продажа сдвинет цену вниз до того как он успеет выйти. Поэтому крупные игроки действуют методично и незаметно.\n\nНакопление (Accumulation):\nКит хочет купить большой объём. Он делает это медленно — покупает небольшими частями в течение недель или месяцев, не допуская резкого роста цены. На графике это выглядит как длинный боковик с поддержкой снизу.\n\nРаспределение (Distribution):\nКит хочет продать накопленное. Аналогично — медленно, частями, не роняя рынок. На графике — боковик у максимумов с сопротивлением сверху.\n\nСтопхантинг (Stop Hunt):\nКиты знают где большинство розничных трейдеров ставят стоп-лоссы — за очевидными уровнями поддержки. Резкий выход за уровень с ликвидацией стопов, а затем возврат — классическая манипуляция. Именно поэтому рекомендуется ставить стопы не прямо за уровень, а чуть дальше.\n\nКак отслеживать китов:\n• Whale Alert — сервис уведомлений о крупных on-chain транзакциях\n• Glassnode, CryptoQuant — аналитика потоков монет на биржи и с бирж\n• Крупный приток монет на биржи = возможная продажа\n• Крупный отток с бирж на холодные кошельки = накопление для долгосрочного хранения' },
          { h: 'Маркет-мейкеры и ликвидность', b: 'Ликвидность — возможность купить или продать актив по рыночной цене без значительного сдвига этой цены. Без ликвидности рынок не функционирует.\n\nКак маркет-мейкер создаёт ликвидность:\nОн постоянно держит два ордера — купить чуть ниже текущей цены (bid) и продать чуть выше (ask). Спред между ними — его заработок. Когда вы нажимаете «купить по рынку» — вы покупаете у маркет-мейкера по его цене ask.\n\nПочему это важно для трейдера:\n• На ликвидных парах (BTC, ETH) спред минимален — 0.01%\n• На неликвидных альткоинах спред может быть 1–5% — вы сразу в минусе при входе\n• Глубокий стакан = ваш крупный ордер не сдвинет цену\n• Тонкий стакан = ваш ордер может создать проскальзывание\n\nПроскальзывание (Slippage):\nРазница между ожидаемой и реальной ценой исполнения при рыночном ордере. На ликвидных парах — доли процента. На малоликвидных при большом объёме — может быть значительным. Используйте лимитные ордера чтобы избежать проскальзывания.' },
          { h: 'Алгоритмические трейдеры и боты', b: 'Значительная часть объёма на криптобиржах — это алгоритмические стратегии, а не действия людей.\n\nВиды алгоритмов:\n• Маркет-мейкинговые боты — поддерживают ликвидность, зарабатывают спред\n• Арбитражные боты — ловят разницу цен между биржами за миллисекунды\n• Трендовые алгоритмы — следуют тренду по сигналам индикаторов\n• Ликвидационные охотники — намеренно двигают цену к скоплению стопов\n\nПочему это важно для ручного трейдера:\nАлгоритмы реагируют быстрее людей. Когда вы видите «хороший вход» — алгоритм уже там. Поэтому ручная торговля конкурентоспособна в нишах где алгоритмам сложно: нестандартные рыночные ситуации, новостные события, аномальные паттерны.\n\nПлюс для алготрейдеров:\nВы сами можете создать собственный алгоритм в терминале TRYVEX — и конкурировать на равных условиях.' },
        ]},
        { id: 'usdt-stablecoins', title: 'Что такое USDT и стейблкоины', sections: [
          { h: 'Что такое стейблкоин', b: 'Стейблкоин — криптовалюта с привязкой к стабильному активу. Чаще всего к доллару США. Цена стейблкоина всегда максимально близка к $1 — отсюда и название (stable = стабильный).\n\nЗачем нужны стейблкоины:\nКриптовалютный рынок работает 24/7, банки — нет. Чтобы зафиксировать прибыль или переждать волатильность не выводя деньги на карту — трейдеры конвертируют активы в стейблкоины. Это позволяет оставаться «в рынке» (быстро зайти обратно) при этом не неся риск падения цены.\n\nОсновные сценарии использования:\n• Фиксация прибыли без вывода на банк\n• Ожидание точки входа в боковике\n• Торговые пары — большинство пар на биржах имеют вид BTCUSDT, ETHUSDT\n• Переводы между биржами — быстро и с минимальной комиссией\n• P2P операции — пополнение и вывод депозита' },
          { h: 'USDT — самый популярный стейблкоин', b: 'USDT (Tether) — самый используемый стейблкоин в мире. Выпускается компанией Tether Limited и обеспечен резервами в долларах, облигациях и других активах.\n\nПочему именно USDT:\n• Наибольшее количество держателей — максимальная ликвидность\n• Доступен на всех крупных биржах\n• Большинство торговых пар именно с USDT\n• Самый высокий суточный объём торгов среди всех стейблкоинов\n\nСети USDT:\nUSDT существует в нескольких блокчейн-сетях:\n• TRC20 (Tron) — комиссия около $1 или почти бесплатно при наличии TRX. Самая экономичная для переводов\n• ERC20 (Ethereum) — комиссия $5–50 в зависимости от загруженности сети\n• BEP20 (BNB Chain) — комиссия около $0.1–0.5\n\nДля переводов между биржами и пополнения депозита рекомендуется TRC20 — минимальные комиссии при той же скорости.' },
          { h: 'USDC и другие стейблкоины', b: 'USDC (USD Coin) — второй по объёму стейблкоин, выпускается компаниями Circle и Coinbase. Более прозрачен по резервам: Circle публикует ежемесячные аудиторские отчёты. Объём торгов по USDC больше чем у USDT, но держателей меньше.\n\nDAI — децентрализованный стейблкоин от протокола MakerDAO. Обеспечен не долларами, а криптовалютными залогами (ETH и другими). Не зависит от централизованной компании — управляется смарт-контрактами и DAO.\n\nUSDe (Ethena) — новое поколение синтетических стейблкоинов. Обеспечен дельта-нейтральными позициями на фьючерсных биржах. Предлагает высокую доходность (~10–20% годовых) но несёт риски стратегии.\n\nРиски стейблкоинов:\n• Депег — потеря привязки к доллару. Произошло с UST (Terra/Luna) в 2022: стейблкоин упал до $0.01 за несколько дней, уничтожив $40 млрд капитализации\n• Регуляторный риск — USDT и USDC могут быть заморожены регуляторами\n• Централизация — Tether и Circle могут заморозить конкретные адреса' },
          { h: 'P2P — как пополнить и вывести депозит', b: 'P2P (Peer-to-Peer) — торговля напрямую между пользователями через гарантию биржи. Работает как безопасная сделка: биржа блокирует средства продавца до момента подтверждения оплаты покупателем.\n\nКак купить USDT через P2P (пополнение депозита):\n1. На бирже выберите «Купить криптовалюту» → «P2P торговля»\n2. Выберите «Продать» (продавцы продают вам USDT за рубли)\n3. Укажите валюту (рубли), выберите USDT\n4. Выберите способ оплаты (банк)\n5. Выбор продавца — важный шаг: смотрите на количество сделок (от 300–500) и процент исполнения (от 95–96%). Продавец с историей — это безопасность и скорость\n6. Введите сумму, подтвердите сделку\n7. Переведите деньги по реквизитам продавца обычным переводом\n8. Сообщите в чате продавцу что перевод выполнен\n9. Подтвердите оплату на бирже — USDT поступит на ваш счёт\n\nКак вывести через P2P:\nАналогично, но выбираете «Купить» — покупатели покупают у вас USDT за рубли. Вы указываете сумму, ждёте оплаты от покупателя, подтверждаете получение — деньги на карте.\n\nПереводы между биржами:\nАктивы → Вывод → Выберите USDT → Сеть TRC20 → Введите адрес получателя. Комиссия около $1. Адрес нужно получить от биржи-получателя (Депозит → USDT → TRC20 → скопировать адрес).' },
        ]},
        { id: 'start-from-zero', title: 'Как начать торговать с нуля', sections: [
          { h: 'С чего реально начать', b: 'Большинство новичков делают одну и ту же ошибку: видят как кто-то заработал, регистрируются на бирже, пополняют счёт и сразу начинают торговать. Результат предсказуем.\n\nПравильная последовательность:\n1. Сначала теория — понять как устроен рынок, что такое стакан, свечи, уровни\n2. Демо-режим — торговать без реальных денег пока не будет стабильного результата\n3. Минимальный депозит — начать с суммой которую не жалко потерять\n4. Масштабирование — увеличивать депозит только после стабильных результатов\n\nПервоначальные вопросы которые нужно решить:\n• На какой бирже торговать?\n• Какие инструменты (спот или фьючерсы)?\n• Какой стиль торговли подходит под ваш образ жизни?\n• Сколько времени в день готовы уделять?\n\nОтвечая на эти вопросы — вы уже на правильном пути.' },
          { h: 'Выбор биржи', b: 'Выбор биржи — первое практическое решение. Критерии которые важны:\n\nОбъём торгов:\nЧем выше объём — тем глубже стакан и меньше проскальзывание. Для активной торговли выбирайте биржи из топ-5 по объёму: Binance, Bybit, OKX.\n\nИстория и репутация:\nИзбегайте малоизвестных бирж — риск потери средств слишком высок. FTX казалась надёжной до своего краха в 2022 году. Проверяйте историю биржи, есть ли случаи проблем с выводами.\n\nДоступность:\nДля русскоязычных трейдеров Bybit и OKX — наиболее доступные варианты без жёстких ограничений для резидентов России.\n\nКомиссии:\nСтандартная комиссия на фьючерсах: Maker (лимитный ордер) 0.02%, Taker (рыночный ордер) 0.055%. При большом количестве сделок разница накапливается — используйте лимитные ордера.\n\nВерификация (KYC):\nПрохождение верификации обязательно для полного доступа к функциям биржи и защиты аккаунта. Без неё — лимиты на вывод.' },
          { h: 'Первые шаги на бирже', b: 'После регистрации и верификации — несколько обязательных шагов:\n\n1. Двухфакторная аутентификация:\nУстановите Google Authenticator или Authy. Привяжите к аккаунту. Без 2FA аккаунт уязвим — это не рекомендация, это обязательное действие.\n\n2. Тест на деривативы:\nПеред торговлей фьючерсами биржа требует пройти тест. Не пугайтесь — если ответ неверный, биржа показывает правильный. Цель теста — убедиться что вы знаете о рисках.\n\n3. Демо-режим:\nBybit и многие другие биржи предлагают демо-аккаунт с виртуальным балансом на реальных котировках. Торгуйте там минимум 2–4 недели прежде чем переходить к реальным деньгам.\n\nВ TRYVEX демо-режим встроен в терминал — не нужно даже регистрироваться на бирже. Подключитесь к демо и начинайте практиковаться немедленно.\n\n4. Начните с малого:\nПервый реальный депозит — сумма с потерей которой вы психологически смиритесь. Обучение всегда стоит денег — лучше заплатить за него небольшую сумму сейчас, чем большую позже.' },
          { h: 'Как выстроить торговый процесс', b: 'Торговля — это процесс, а не случайные решения. Профессионал отличается от любителя наличием системы.\n\nТорговый план:\nПеред каждой сделкой запишите: почему входите, где стоп, где тейк-профит, какой размер позиции. Если не можете сформулировать причину входа — не входите.\n\nТорговый журнал:\nЗаписывайте каждую сделку. Минимум: инструмент, направление, размер, причина входа, результат. Через 50–100 сделок вы увидите собственные паттерны ошибок которые иначе не заметить.\n\nРаспорядок дня:\n• Утром — анализ рынка, определение ключевых уровней\n• В течение дня — торговля по плану\n• Вечером — разбор сделок в журнале\n\nЗнайте когда НЕ торговать:\n• Крупные новостные события (решения ФРС, отчёты CPI) — рынок непредсказуем\n• После серии убытков — эмоциональное состояние нарушено\n• При отсутствии чёткого сигнала — лучший трейдер часто тот кто торгует меньше' },
        ]},
        { id: 'leverage-full', title: 'Кредитное плечо — полный разбор', sections: [
          { h: 'Как работает кредитное плечо', b: 'Кредитное плечо (leverage) — инструмент позволяющий торговать объёмом в несколько раз превышающим ваш реальный капитал. Биржа фактически даёт вам кредит для открытия позиции.\n\nПример ×10:\nУ вас $1 000. При плече ×10 вы можете открыть позицию на $10 000.\n• Если цена вырастет на 1% — ваша прибыль $100 (10% от депозита)\n• Если цена упадёт на 1% — убыток $100 (10% от депозита)\n• Если цена упадёт на 10% — убыток $1 000 (100% депозита = ликвидация)\n\nФормула расчёта ликвидации (упрощённо):\nРасстояние до ликвидации = 1 / Плечо\nПри ×10 — цена должна упасть на 10%\nПри ×20 — на 5%\nПри ×100 — на 1%\n\nВ реальности биржа ликвидирует чуть раньше чем маржа достигнет нуля — для покрытия своих расходов.' },
          { h: 'Изолированная и кросс-маржа', b: 'Это два режима работы с маржой — принципиально разные по риску.\n\nИзолированная маржа (Isolated):\nВы выделяете конкретную сумму под конкретную позицию. При ликвидации теряете только эту сумму, остальной депозит в безопасности.\nПример: депозит $5 000, выделили $500 под позицию с ×10. Ликвидация = потеря $500, не более.\nДля кого: большинство трейдеров, особенно новички.\n\nКросс-маржа (Cross):\nВесь баланс аккаунта используется как обеспечение всех открытых позиций. При убытке система берёт средства с других позиций.\nПреимущество: позиция получает дополнительное время до ликвидации при движении против.\nРиск: при сильном движении можно потерять весь баланс, а не только маржу одной позиции.\nДля кого: опытные трейдеры с несколькими захеджированными позициями.\n\nРекомендация: используйте изолированную маржу по умолчанию.' },
          { h: 'Разумное использование плеча', b: 'Профессиональные трейдеры используют плечо не для максимизации прибыли, а для оптимизации использования капитала.\n\nПравильная логика:\nПри стопе в 0.5% и плече ×5 вы рискуете 2.5% депозита на сделку — это нормально.\nПри стопе в 0.5% и плече ×50 вы рискуете 25% депозита — это катастрофа.\n\nПлечо должно определяться размером стопа и допустимым риском, а не желаемой прибылью.\n\nРекомендации по плечу:\n• Новички — ×2–3 максимум\n• Опытные с короткими стопами — ×5–10\n• ×20+ только для сделок длительностью секунды–минуты с минимальным риском на депозит\n\nОшибка которую совершают все новички:\n«Я поставлю большое плечо, потому что уверен в этой сделке» — именно так теряют депозиты. Уверенность не отменяет вероятность ошибки. Плечо только увеличивает цену этой ошибки.\n\nПравило: если вам некомфортно смотреть на плавающий убыток — плечо слишком высокое.' },
          { h: 'Фандинг-рейт', b: 'Фандинг (Funding Rate) — периодические платежи между держателями лонгов и шортов в перпетуальных фьючерсах. Это механизм привязки цены контракта к спотовой цене.\n\nКак работает:\nКаждые 8 часов биржа рассчитывает разницу между ценой контракта и спотовой ценой.\n• Контракт дороже спота (много лонгов) → лонги платят шортам\n• Контракт дешевле спота (много шортов) → шорты платят лонгам\n\nРазмер фандинга: обычно 0.01–0.03% каждые 8 часов = 0.03–0.09% в сутки.\nПри экстремальном настроении рынка фандинг может вырасти до 0.1–0.3% каждые 8 часов.\n\nПрактическое значение для трейдера:\n• Высокий положительный фандинг = слишком много лонгов = перегрев рынка, возможная коррекция\n• Высокий отрицательный фандинг = слишком много шортов = возможный шорт-сквиз (резкий рост)\n• При удержании позиции несколько дней — фандинг накапливается и влияет на итоговый результат\n\nСтратегия фандинг-арбитража:\nПри очень высоком положительном фандинге — открыть шорт на фьючерсах и хедж-лонг на споте. Позиция нейтральна по цене, но вы получаете фандинг от лонгов каждые 8 часов.' },
        ]},
        { id: 'beginner-mistakes', title: 'Топ ошибок начинающих трейдеров', sections: [
          { h: 'Отсутствие торгового плана', b: 'Самая распространённая ошибка: торговля «на ощущениях» без чётких правил. Трейдер видит движение — входит. Видит небольшую прибыль — выходит. Видит убыток — ждёт. Это не торговля, это азартная игра.\n\nПоследствие: результаты нестабильны и непредсказуемы. Невозможно понять что работает, а что нет.\n\nРешение: перед каждой сделкой письменно ответьте на три вопроса:\n1. Почему я вхожу? (конкретный технический сигнал)\n2. Где я окажусь неправ? (уровень стоп-лосса)\n3. Какова моя цель? (уровень тейк-профита)\n\nЕсли не можете ответить — не входите.' },
          { h: 'Торговля без стоп-лосса', b: 'Трейдер входит в позицию, стоп не ставит — «сейчас вернётся». Цена идёт дальше против. Убыток растёт. Теперь ждёт уже не возврата к цене входа, а хотя бы до уровня «закрыть в минус 1%». Но цена продолжает падать.\n\nТак небольшой управляемый убыток превращается в катастрофу. На бирже это называют «резать лося» — закрывать позицию с большим убытком после того как долго «пересиживали».\n\nПочему люди не ставят стопы:\n• Надеются что цена вернётся\n• Не хотят «зафиксировать убыток» (как будто без фиксации его нет)\n• Думают что знают рынок лучше\n\nПравило без исключений: стоп-лосс ставится одновременно с открытием позиции. Позиция без стопа — не торговля, а ставка.' },
          { h: 'Усреднение убыточной позиции', b: 'Цена пошла против вас. Вместо того чтобы закрыть убыток, трейдер добирает позицию — «усредняет». Логика: «теперь мне нужно меньшее движение чтобы выйти в ноль».\n\nПочему это опасно:\nВы утраиваете риск на позицию которая уже показывает что вы были неправы. Сигнал на вход который вы видели изначально больше не актуален — рынок изменился. Новая позиция открывается не по торговой системе, а из желания «отбить».\n\nМатематика против вас:\nВошли на $100 с ×10 = позиция $1 000. Усреднились ещё на $100 = позиция $2 000 при том же плече. Теперь движение на 5% = потеря $100 (100% второй маржи). Вы удвоили риск, а не снизили его.\n\nИсключение — плановое усреднение:\nЕсть стратегии (TrailingAdd, сетка) где доборы предусмотрены изначально с чёткими правилами. Это не «усреднение от страха» — это часть системы с заранее рассчитанным риском.' },
          { h: 'FOMO и торговля на эмоциях', b: 'FOMO (Fear Of Missing Out, страх упустить) — вход в позицию глядя на уже ушедшее движение.\n\nТипичная ситуация:\nBTC вырос на 5% за час. Везде обсуждают. «Надо брать пока не улетело». Трейдер входит на хаях. Движение заканчивается. Откат. Убыток.\n\nПочему FOMO убивает депозиты:\nВы входите в момент максимальной перегретости рынка — когда риск наибольший и потенциал движения наименьший. Именно в эти моменты профессионалы фиксируют прибыль, а новички покупают.\n\nФомо-сигналы:\n• Сильное желание войти прямо сейчас не дожидаясь сигнала\n• «Все говорят что вырастет»\n• Чувство что «этот поезд уйдёт»\n\nПравило: пропустили движение — ждите следующую возможность. Рынок всегда даёт новые входы.\n\nМесть рынку:\nПосле убытка немедленно открыть новую сделку с увеличенным объёмом чтобы «отбить». Это не торговля — это азарт. После серии убытков делайте паузу минимум на 2–3 часа.' },
          { h: 'Слишком высокое плечо', b: 'Новички видят что ×100 означает «из $100 сделать $10 000». Это математически верно — и практически невозможно.\n\nЧто происходит в реальности:\nПри ×100 ликвидация наступает при движении цены на 1%. BTC за день легко двигается на 3–5%. Большинство позиций с ×100 ликвидируются в течение первых часов.\n\nСтатистика:\nБиржи публично говорят что 70–80% аккаунтов использующих плечо ×50+ теряют депозит в течение первых 3 месяцев.\n\nРекомендация:\nНачинайте с ×2–3. Изучите как себя чувствуете при плавающем убытке. Постепенно увеличивайте плечо — только когда стабильно прибыльны на меньшем.' },
          { h: 'Нарушение мани-менеджмента', b: 'Одна из самых разрушительных ошибок — изменение размера позиции под настроение.\n\nТипичные варианты:\n• «Эта сделка кажется очень надёжной» — вхожу в 3 раза большим объёмом\n• «Надо отбить вчерашний убыток» — удваиваю позицию\n• «Сегодня всё идёт хорошо» — увеличиваю риск\n\nПочему это проблема:\nВаша уверенность в сделке не коррелирует с её реальной надёжностью. Если вы торгуете одинаковые по качеству сигналы, но одни с объёмом ×1, а другие с ×3, — одна крупная неудача перекроет три успеха.\n\nПравило профессионала:\nТоргуйте одинаковым размером позиции на каждой сделке независимо от «уверенности». Размер пересматривайте не чаще раза в неделю, и только исходя из изменения размера депозита — не из текущего настроения.' },
        ]},
        { id: 'bybit-guide', title: 'Bybit — полное руководство', sections: [
          { h: 'Почему Bybit', b: 'Bybit — одна из крупнейших криптовалютных бирж мира, основана в 2018 году. По объёму торгов фьючерсами входит в топ-3 глобально.\n\nПреимущества для трейдера:\n• Высокая ликвидность — глубокий стакан по всем топовым парам\n• Доступность — работает для пользователей из России без VPN\n• Конкурентные комиссии — Maker 0.02%, Taker 0.055%\n• Демо-торговля — официальный демо-аккаунт с реальными котировками\n• Широкий выбор инструментов — спот, линейные фьючерсы, обратные фьючерсы, опционы\n• Качественное мобильное приложение и веб-интерфейс\n\nBybit поддерживается в терминале TRYVEX — подключение через API-ключи открывает полный функционал: торговля, алготрейдинг, скринеры.' },
          { h: 'Регистрация и верификация', b: 'Регистрация:\n1. Перейдите на bybit.com (используйте только официальный сайт)\n2. Укажите email и создайте надёжный пароль\n3. Подтвердите email\n4. Обязательно включите 2FA (Google Authenticator)\n\nВерификация личности (KYC):\nНеобходима для снятия лимитов на вывод и доступа ко всем функциям.\n1. Профиль → Верификация\n2. Базовая верификация: имя, страна, фото документа\n3. Расширенная: селфи с документом\nПроцесс занимает от нескольких минут до нескольких часов.\n\nТест на деривативы:\nПеред доступом к фьючерсной торговле биржа требует пройти тест. Если ответ неверный — биржа показывает правильный и вы продолжаете. Пройдите внимательно — информация в тесте реально важна.' },
          { h: 'Структура аккаунта', b: 'На Bybit деньги хранятся на разных суб-аккаунтах:\n\n• Финансовый аккаунт (Funding) — куда приходят средства с P2P\n• Единый торговый аккаунт (Unified Trading Account, UTA) — для спота и деривативов\n\nДля начала торговли нужно перевести средства с финансового на торговый аккаунт. Перевод мгновенный и без комиссии.\n\nПуть средств:\nP2P → Финансовый аккаунт → Торговый аккаунт → Торговля\n\nПри выводе — обратный путь:\nТорговый → Финансовый → P2P вывод на карту' },
          { h: 'API-ключи для TRYVEX', b: 'Для подключения Bybit к терминалу TRYVEX нужны API-ключи.\n\nКак создать:\n1. Профиль → Настройки аккаунта → API\n2. Создать новый ключ → Системно-сгенерированный\n3. Название: например «TRYVEX Terminal»\n4. Разрешения: Чтение + Торговля (фьючерсы и/или спот)\n5. ВАЖНО: НЕ включать разрешение на вывод средств\n6. Ограничение по IP: опционально, но повышает безопасность\n7. Сохранить API Key и Secret Key — Secret показывается только один раз\n\nДемо-аккаунт Bybit:\nBybit предоставляет отдельный демо-аккаунт с виртуальным балансом. Зарегистрируйтесь в Demo Trading, создайте отдельные API-ключи для демо, в TRYVEX включите переключатель «Demo» при добавлении подключения.' },
        ]},
        { id: 'binance-guide', title: 'Binance — полное руководство', sections: [
          { h: 'Binance — крупнейшая биржа мира', b: 'Binance основана в 2017 году, сейчас крупнейшая криптобиржа по объёму торгов. Более 120 миллионов пользователей по всему миру.\n\nОтличительные особенности:\n• Наибольший выбор торговых пар — более 350 спотовых пар\n• BNB-скидка — оплата комиссий токеном BNB даёт скидку 25%\n• Экосистема — Binance Labs, Launchpad для новых проектов, BNB Chain\n• Earn-продукты — стейкинг, Flexible Savings, Dual Investment\n\nОграничения:\nBinance ввёл ряд ограничений для некоторых юрисдикций. Для российских пользователей в определённые периоды могут быть ограничения — уточняйте актуальный статус.\n\nВ TRYVEX поддерживаются оба подключения — и Binance Spot, и Binance Futures.' },
          { h: 'Регистрация и настройка', b: 'Регистрация:\n1. binance.com → Зарегистрироваться\n2. Email + пароль, подтверждение\n3. Обязательно: 2FA через Google Authenticator\n\nВерификация (KYC):\nУправление аккаунтом → Верификация личности.\nБазовая верификация открывает вывод до 20 BTC в сутки.\nПродвинутая верификация — без лимитов.\n\nAPI для TRYVEX:\n1. Профиль → Управление API\n2. Создать API → Введите название\n3. Пройдите верификацию (email + 2FA код)\n4. Разрешения: Разрешить чтение, Включить спотовую торговлю, Включить фьючерсы\n5. Ограничение IP — рекомендуется для безопасности\n6. НЕ включать право на вывод\n7. Сохранить ключи — Secret виден только при создании' },
          { h: 'Binance Spot vs Futures', b: 'На Binance два основных торговых раздела:\n\nSpot (Спот):\nТорговля реальными активами. Купили ETH — ETH у вас в кошельке на бирже. Нет риска ликвидации, нет фандинга. Подходит для средне и долгосрочных позиций.\n\nUSDT-Margined Futures:\nФьючерсы с маржой в USDT. Торгуете контрактами, доступны лонг и шорт, кредитное плечо до ×125. Перпетуальные контракты (без даты экспирации) и квартальные (закрываются в дату экспирации).\n\nCoin-Margined Futures:\nМаржа в самой монете (BTC, ETH). Прибыль/убыток в монете, не в USDT. Специфика: при росте рынка ваша маржа растёт вместе с позицией.\n\nДля большинства трейдеров:\nNUSDT-Margined перпетуальные фьючерсы — наиболее понятный и популярный инструмент.' },
          { h: 'Комиссии и BNB', b: 'Стандартные комиссии на фьючерсах Binance:\n• Maker (лимитный ордер): 0.02%\n• Taker (рыночный ордер): 0.04%\n\nСкидка с BNB:\nЕсли включить оплату комиссий токеном BNB — скидка 10% (иногда больше по акциям). При активной торговле это существенная экономия.\n\nРеферальная программа:\nПо реферальной ссылке при регистрации можно получить скидку на комиссии (до 20%). Используйте официальные источники.\n\nVIP-уровни:\nЧем выше объём торгов за 30 дней — тем ниже комиссии. VIP1 начинается от объёма $1M/30д.' },
        ]},
        { id: 'scalping-practical', title: 'Скальпинг — практическое руководство', sections: [
          { h: 'Что такое скальпинг и как он работает', b: 'Скальпинг — стиль торговли где позиции удерживаются от нескольких секунд до нескольких минут. Цель каждой сделки небольшая, но количество сделок высокое.\n\nСуть скальпинга:\nРынок постоянно колеблется. Даже в полностью боковом движении цена ходит вверх-вниз на 0.1–0.5% снова и снова. Скальпер зарабатывает на каждом таком колебании.\n\nОтличие от других стилей:\n• Не нужно предсказывать направление на часы или дни — только на следующие минуты\n• Убытки маленькие и быстро фиксируются\n• Стресс высокий — нужна концентрация и быстрые решения\n• Требует качественного инструментария — хорошего терминала, быстрого интернета\n\nЭффективность торговли определяется не количеством сделок, а их качеством. 5 хороших скальп-сделок лучше 50 случайных.' },
          { h: 'Инструменты скальпера', b: 'Успешный скальпинг требует правильного набора инструментов.\n\nГрафик:\nОсновные таймфреймы: 1м и 5м для входов, 15м для контекста. Иногда тиковый график — каждый тик (минимальное изменение цены) отдельной точкой.\n\nСтакан ордеров:\nГлавный инструмент скальпера. Показывает где стоят крупные заявки и как распределяется давление покупателей и продавцов прямо сейчас. Горизонтальный режим стакана — наиболее удобен при скальпинге.\n\nТейп (Tape Reading):\nПоток реальных сделок в реальном времени. Позволяет видеть не заявки, а реальные исполненные сделки — кто покупает, кто продаёт, какими объёмами.\n\nСкринеры:\nСкинер резких движений TRYVEX показывает какие инструменты двигаются прямо сейчас. Клик — инструмент открывается в скальпинг-панели.\n\nТерминал TRYVEX:\nСкальпинг-модуль создан специально для этого стиля: несколько панелей, синхронизация по цветам, горячие клавиши для мгновенных входов.' },
          { h: 'Стратегии скальпинга', b: 'Несколько рабочих подходов к скальпингу.\n\nСкальпинг от уровня:\nОпределяете ближайший уровень поддержки или сопротивления. Ждёте подхода цены. При появлении разворотного сигнала (разворотная свеча, поглощение в стакане) входите с коротким стопом за уровень. Цель — 2–3 тика или ближайшая зона ликвидности.\n\nСкальпинг пробоев:\nМониторите инструменты через скринер. При резком спайке с объёмом входите в направлении движения на импульсе. Очень короткая позиция — секунды–минуты.\n\nСкальпинг в диапазоне (Range Scalping):\nКогда инструмент торгуется в чётком диапазоне: покупаете у нижней границы, продаёте у верхней. Повторяете пока диапазон не сломается.\n\nРазмер позиции:\nПри скальпинге из-за маленького стопа размер позиции часто больше чем при свинге. Главное — риск на сделку не должен превышать 0.5–1% депозита независимо от размера позиции.' },
          { h: 'Настройка рабочего места скальпера', b: 'Комфортное рабочее место напрямую влияет на результат.\n\nМонитор:\nЖелательно два монитора: на одном несколько стаканов с разными инструментами, на другом — общий рыночный контекст и скринеры.\n\nИнтернет:\nСтабильное проводное соединение. При скальпинге разрыв соединения на несколько секунд может дорого обойтись.\n\nВ TRYVEX — настройка скальпинг-пространства:\n1. Создайте несколько панелей кнопкой +\n2. Назначьте инструменты каждой панели\n3. Настройте горизонтальный стакан для лучшего обзора\n4. Синхронизируйте нужные панели цветом\n5. Сохраните конфигурацию как страницу — можно создать несколько рабочих пространств\n\nПсихология скальпинга:\nГлавное испытание скальпинга — скорость принятия решений. Нет времени на долгий анализ. Должны быть чёткие, заранее отработанные сигналы на вход — мышечная память.\nПосле серии убытков — пауза обязательна. Скальпинг в плохом состоянии разрушителен.' },
        ]},
        { id: 'levels-practical', title: 'Как торговать по уровням', sections: [
          { h: 'Что такое уровень и почему он работает', b: 'Уровень поддержки или сопротивления — это ценовая зона где в прошлом неоднократно происходил разворот или замедление цены.\n\nПочему уровни работают — психология рынка:\nПредположим BTC трижды отбивался от $45 000 и разворачивался вверх. Тысячи трейдеров это видят и запоминают. В следующий раз при подходе к $45 000:\n• Те кто потерял стоп ниже ставят новые покупки\n• Те кто не успел купить в прошлые разы ставят лимитные ордера\n• Алгоритмы реагируют на тот же уровень\n\nВсё это создаёт реальное давление покупателей на уровне — самовыполняющееся пророчество.\n\nУровни существуют потому что у рынка есть память. Чем значимее событие на уровне в прошлом — тем сильнее реакция в будущем.' },
          { h: 'Как определять уровни', b: 'Уровни бывают горизонтальными и динамическими.\n\nГоризонтальные уровни:\n• Предыдущие максимумы и минимумы — цена помнит где разворачивалась\n• Зоны консолидации — боковики часто становятся поддержкой/сопротивлением после пробоя\n• Круглые числа — $50 000, $100 000 для BTC — психологические магниты\n• Уровни открытия недели/месяца — на которые ориентируются крупные игроки\n\nДинамические уровни:\n• Скользящие средние (MA20, MA50, MA200) — в тренде цена регулярно откатывается к ним\n• Линии тренда — соединяют последовательные минимумы или максимумы\n\nКак рисовать уровни правильно:\n• Уровень — это зона, а не точная цена. Рисуйте прямоугольник ±0.5–1%\n• Смотрите на закрытия свечей, не на тени — тени часто провоцационные\n• Меньше уровней = лучше. 3–5 ключевых уровней на графике достаточно\n• Начинайте с дневного или 4-часового графика, потом переходите к младшим таймфреймам' },
          { h: 'Торговля от уровня — вход', b: 'Подход цены к уровню — это возможность, не сигнал. Нужно дождаться подтверждения.\n\nАлгоритм входа от уровня поддержки:\n1. Идентифицируйте значимый уровень поддержки\n2. Дождитесь подхода цены к уровню\n3. Смотрите на поведение цены у уровня:\n   — Снижение объёма при подходе (продавцы выдыхаются)\n   — Появление поглощения, молота или пин-бара\n   — Сужение свечей — неопределённость перед разворотом\n4. Вход при появлении разворотного сигнала\n5. Стоп — за уровень (обычно 0.5–1% ниже зоны поддержки)\n6. Тейк — следующий уровень сопротивления\n\nТочность входа:\nЛучший вход — не «у уровня» а «от уровня». Ждите подтверждающую свечу которая закрылась выше уровня после теста. Это уменьшает стоп и улучшает соотношение риск/прибыль.' },
          { h: 'Пробой и ретест уровня', b: 'Когда уровень пробивается — это не конец истории, а начало новой торговой возможности.\n\nЧто происходит при пробое:\nПри пробое сопротивления с объёмом — продавцы капитулируют, их стоп-баи ускоряют движение вверх. Уровень меняет роль: бывшее сопротивление становится поддержкой.\n\nРетест (Retest):\nПосле пробоя цена часто возвращается к пробитому уровню «тестируя» его в новом качестве. Это оптимальная точка входа:\n• Меньший стоп (за уровень)\n• Лучшее соотношение риск/прибыль\n• Психологически проще войти на откате чем в момент импульса\n\nКак торговать ретест:\n1. Дождитесь пробоя и удаления цены от уровня\n2. Дождитесь возврата к уровню\n3. Ищите подтверждение (разворотная свеча)\n4. Вход, стоп за уровень\n\nЛожный пробой (Fakeout):\nЦена выходит за уровень и немедленно возвращается. Это также торговая возможность — вход в обратном направлении при возврате. Признак ложного пробоя: тень за уровнем но закрытие внутри.' },
        ]},
        { id: 'rsi-guide', title: 'RSI — как использовать правильно', sections: [
